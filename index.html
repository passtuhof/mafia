<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мафия</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#d60000;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-bottom:15px;
}

th, td{
    border:1px solid #444;
    padding:8px;
}

th{
    background:#222;
}

.col-number{
    width:34px;
    min-width:34px;
    max-width:34px;
    text-align:center;
}

.col-player{
    width:auto;
}

.col-role{
    width:180px;
}

.col-drag{
    width:34px;
    min-width:34px;
    max-width:34px;
    text-align:center;
}

input, select{
    width:100%;
    background:#1d1d1d;
    color:white;
    border:none;
    padding:8px;
    font-size:15px;
    outline:none;
}

input:disabled,
select:disabled{
    opacity:1;
    color:white;
    background:#1d1d1d;
}

.buttons{
    display:flex;
    gap:10px;
}

button{
    height:50px;
    font-size:24px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#d60000;
    color:white;
    padding:0 18px;
}

.small-btn{
    width:50px;
}

.play-btn{
    width:auto;
    font-size:18px;
    font-weight:bold;
}

.drag-handle{
    cursor:grab;
    user-select:none;
    font-size:20px;
    color:#aaa;
    touch-action:none;
}

.dragging{
    opacity:0.45;
}
</style>
</head>

<body>

<h1>Мафия</h1>

<table>
    <thead>
        <tr>
            <th class="col-number">№</th>
            <th class="col-player">Игрок</th>
            <th class="col-role">Роль</th>
            <th class="col-drag"></th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<div class="buttons">
    <button class="small-btn" onclick="addRow()">+</button>
    <button class="small-btn" onclick="removeRow()">−</button>
    <button class="play-btn" onclick="startGame()">Играть</button>
</div>

<script>
let players = [];
let gameStarted = false;
let draggedIndex = null;

for(let i = 0; i < 10; i++){
    players.push({
        name: '',
        role: '👤 Мирный'
    });
}

function roleOptions(selectedRole){
    const roles = [
        '👤 Мирный',
        '🔫 Мафия',
        '⭐ Комиссар',
        '🚑 Доктор',
        '🔪 Маньяк'
    ];

    return roles.map(role => `
        <option ${role === selectedRole ? 'selected' : ''}>${role}</option>
    `).join('');
}

function renderTable(){
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';

    players.forEach((player, index) => {
        const row = document.createElement('tr');

        row.draggable = false;

        row.innerHTML = `
            <td class="col-number">${index + 1}</td>

            <td>
                <input
                    type="text"
                    value="${player.name}"
                    ${gameStarted ? 'disabled' : ''}
                    oninput="updateName(${index}, this.value)"
                >
            </td>

            <td>
                <select 
                    ${gameStarted ? 'disabled' : ''}
                    onchange="updateRole(${index}, this.value)"
                >
                    ${roleOptions(player.role)}
                </select>
            </td>

            <td class="col-drag">
                <div 
                    class="drag-handle"
                    draggable="true"
                    ondragstart="dragStart(event, ${index})"
                    ondragover="dragOver(event)"
                    ondrop="dropRow(event, ${index})"
                    ondragend="dragEnd(event)"
                >☰</div>
            </td>
        `;

        row.ondragover = dragOver;
        row.ondrop = function(event){
            dropRow(event, index);
        };

        tbody.appendChild(row);
    });
}

function updateName(index, value){
    players[index].name = value;
}

function updateRole(index, value){
    players[index].role = value;
}

function addRow(){
    players.push({
        name: '',
        role: '👤 Мирный'
    });

    renderTable();
}

function removeRow(){
    if(players.length <= 1) return;

    players.pop();
    renderTable();
}

function startGame(){
    gameStarted = true;
    renderTable();
}

function dragStart(event, index){
    draggedIndex = index;
    event.target.closest('tr').classList.add('dragging');
}

function dragOver(event){
    event.preventDefault();
}

function dropRow(event, targetIndex){
    event.preventDefault();

    if(draggedIndex === null || draggedIndex === targetIndex) return;

    const movedPlayer = players.splice(draggedIndex, 1)[0];
    players.splice(targetIndex, 0, movedPlayer);

    draggedIndex = null;
    renderTable();
}

function dragEnd(event){
    event.target.closest('tr')?.classList.remove('dragging');
    draggedIndex = null;
}

renderTable();
</script>

</body>
</html>
