<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мафия</title>
<!-- compact-cards: lower height, fixed outside numbers, top finish cross -->
<!-- smooth-drag-placeholder: cards open gap and drop into placeholder -->
<!-- smooth-drag: floating card follows finger -->
<!-- cards-ui: player list rebuilt as cards -->

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    padding:20px;
}

h1{
    text-align:center;
    color:#d60000;
    margin:0;
}

.top-header{
    display:grid;
    grid-template-columns:40px 1fr 40px;
    align-items:center;
    margin-bottom:20px;
}

.top-spacer{
    width:40px;
    height:40px;
}

.top-finish-btn{
    width:40px;
    height:40px;
    border:none;
    background:transparent;
    color:#d60000;
    font-size:22px;
    cursor:pointer;
    padding:0;
}

.phase-title{
    color:white;
    font-size:22px;
    font-weight:600;
    padding-left:12px;
    border-left:4px solid #d60000;
    margin-bottom:20px;
}

.players-table{
    width:100%;
    display:flex;
    flex-direction:column;
    gap:6px;
}

.header-row{
    display:none !important;
}

.player-row{
    display:grid;
    grid-template-columns:34px minmax(0,1fr) 136px 28px;
    align-items:center;
    gap:7px;
    min-height:44px;
    padding:0;
    margin-bottom:0;
    background:transparent;
    border:none;
    border-radius:0;
    box-shadow:none;
}

.cell{
    min-height:38px;
    border:none;
    display:flex;
    align-items:center;
    padding:0;
    background:transparent;
    overflow:hidden;
}

.header-cell{
    background:transparent;
    justify-content:center;
    font-weight:bold;
}

.number-cell{
    width:30px;
    height:30px;
    justify-content:center;
    text-align:center;
    border:1px solid #444;
    border-radius:50%;
    background:#111;
    color:white;
    font-weight:700;
    font-size:14px;
    flex-shrink:0;
}

.drag-cell{
    border:none;
    background:transparent;
    padding:0;
    display:flex;
    align-items:center;
    justify-content:center;
}

.drag-handle{
    height:38px;
    width:26px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#aaa;
    font-size:20px;
    user-select:none;
    touch-action:none;
    cursor:grab;
}

.drag-handle:active{
    cursor:grabbing;
}

input,select{
    width:100%;
    min-height:32px;
    background:#222;
    color:white;
    border:1px solid #2d2d2d;
    padding:6px 8px;
    font-size:14px;
    outline:none;
    border-radius:8px;
}

input:disabled,
select:disabled{
    opacity:1;
    color:white;
    background:#222;
    pointer-events:none;
}

.buttons{
    display:flex;
    gap:10px;
    margin-top:15px;
    flex-wrap:wrap;
}

.main-btn{
    height:50px;
    font-size:24px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#d60000;
    color:white;
    padding:0 18px;
}

.main-btn:disabled{
    background:#555;
    cursor:not-allowed;
}

.small-btn{
    width:50px;
    padding:0;
}

.start-btn,
.choice-btn,
.finish-btn{
    font-size:18px;
    font-weight:bold;
}

.wake-block{
    margin-top:18px;
}

.wake-title{
    font-size:20px;
    font-weight:600;
    margin-bottom:10px;
}

.action-text{
    color:#d60000;
    font-size:18px;
    font-weight:bold;
}

.choice-history{
    margin-top:14px;
    font-size:17px;
    color:white;
    line-height:1.5;
}

.role-highlight .cell:not(.drag-cell){
    background:#e5c100 !important;
    color:#111 !important;
}

.role-highlight input,
.role-highlight select{
    background:#e5c100 !important;
    color:#111 !important;
}

.target-highlight .cell:not(.drag-cell){
    background:#d60000 !important;
    color:white !important;
}

.target-highlight input,
.target-highlight select{
    background:#d60000 !important;
    color:white !important;
}

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.75);
    align-items:center;
    justify-content:center;
    z-index:999;
}

.modal-content{
    background:#1d1d1d;
    border:1px solid #444;
    border-radius:16px;
    padding:22px;
    width:90%;
    max-width:330px;
    text-align:center;
}

.modal-content p{
    font-size:22px;
    margin-bottom:20px;
}

.modal-buttons{
    display:flex;
    gap:10px;
}

.modal-buttons button{
    flex:1;
    height:48px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    color:white;
}

.yes-btn{background:#d60000;}
.no-btn{background:#333;}

/* card layout highlight overrides */
.role-highlight{
    background:#e5c100 !important;
    color:#111 !important;
    border-color:#e5c100 !important;
}

.role-highlight .number-cell,
.role-highlight input,
.role-highlight select{
    background:#e5c100 !important;
    color:#111 !important;
    border-color:rgba(0,0,0,0.25) !important;
}

.target-highlight{
    background:#d60000 !important;
    color:white !important;
    border-color:#d60000 !important;
}

.target-highlight .number-cell,
.target-highlight input,
.target-highlight select{
    background:#d60000 !important;
    color:white !important;
    border-color:rgba(255,255,255,0.25) !important;
}

.green-target-highlight{
    background:#2ecc71 !important;
    color:#111 !important;
    border-color:#2ecc71 !important;
}

.green-target-highlight .number-cell,
.green-target-highlight input,
.green-target-highlight select{
    background:#2ecc71 !important;
    color:#111 !important;
    border-color:rgba(0,0,0,0.25) !important;
}

.dead-player{
    background:#555 !important;
    border-color:#666 !important;
}

.dead-player .number-cell,
.dead-player input,
.dead-player select{
    background:#555 !important;
    color:white !important;
    border-color:#666 !important;
}



.drag-placeholder{
    min-height:44px;
    border:2px dashed #d60000;
    border-radius:14px;
    background:rgba(214,0,0,0.12);
    margin:0;
    transition:all 0.16s ease;
}

.dragging-source{
    display:none !important;
}

.drag-floating-card{
    position:fixed;
    left:0;
    top:0;
    z-index:5000;
    pointer-events:none;
    transform:translate3d(0,0,0);
    transition:none !important;
    box-shadow:0 18px 40px rgba(0,0,0,0.55) !important;
    opacity:0.96;
}


#finishBtn{display:none !important;}

.data-row .cell:not(.number-cell):not(.drag-cell){
    background:linear-gradient(180deg,#1b1b1b,#141414);
    border:1px solid #333;
}

.data-row .cell:nth-child(2){
    border-radius:12px 0 0 12px;
    border-right:none;
    padding-left:7px;
}

.data-row .cell:nth-child(3){
    border-radius:0 12px 12px 0;
    padding-right:7px;
}



/* compact cards: keep number outside visual card */
.role-highlight .number-cell,
.target-highlight .number-cell,
.green-target-highlight .number-cell{
    background:#111 !important;
    color:white !important;
    border-color:#444 !important;
}

.role-highlight .cell:not(.number-cell):not(.drag-cell){
    background:#e5c100 !important;
    color:#111 !important;
    border-color:#e5c100 !important;
}

.target-highlight .cell:not(.number-cell):not(.drag-cell){
    background:#d60000 !important;
    color:white !important;
    border-color:#d60000 !important;
}

.green-target-highlight .cell:not(.number-cell):not(.drag-cell){
    background:#2ecc71 !important;
    color:#111 !important;
    border-color:#2ecc71 !important;
}


.drag-floating-card .number-cell{visibility:hidden;}
</style>
</head>

<body>

<div class="top-header">
    <div class="top-spacer"></div>
    <h1>Мафия</h1>
    <button id="topFinishBtn" class="top-finish-btn" type="button">❌</button>
</div>

<div class="phase-title" id="phaseTitle">Знакомство</div>

<div class="players-table" id="playersTable">
    <div class="player-row header-row">
        <div class="cell header-cell number-cell">№</div>
        <div class="cell header-cell">Игрок</div>
        <div class="cell header-cell">Роль</div>
        <div class="drag-cell"></div>
    </div>
</div>

<div class="buttons" id="startButtons">
    <button class="main-btn small-btn" id="addBtn">+</button>
    <button class="main-btn small-btn" id="removeBtn">−</button>
    <button class="main-btn start-btn" id="startBtn">Начать</button>
</div>

<div class="buttons" id="gameButtons" style="display:none;">
    <button class="main-btn choice-btn" id="choiceBtn" disabled>Выбор</button>
    <button class="main-btn finish-btn" id="finishBtn">Завершить</button>
</div>

<div class="wake-block" id="wakeBlock" style="display:none;">
    <div class="wake-title" id="wakeTitle"></div>
    <div class="action-text" id="actionText"></div>
    <div class="choice-history" id="choiceHistory"></div>
</div>

<div class="modal" id="finishModal">
    <div class="modal-content">
        <p>Завершить игру?</p>
        <div class="modal-buttons">
            <button class="yes-btn" id="finishYesBtn">Да</button>
            <button class="no-btn" id="finishNoBtn">Нет</button>
        </div>
    </div>
</div>

<script>
const STORAGE_KEY = 'mafia_app_state_stable_v1';

const ROLE_CIVILIAN = '👤 Мирный';
const ROLE_MAFIA = '🔫 Мафия';
const ROLE_COMMISSIONER = '⭐ Комиссар';
const ROLE_DOCTOR = '🚑 Доктор';
const ROLE_MANIAC = '🔪 Маньяк';

let players = [];
let gameStarted = false;
let gameStage = 'intro';
let activeWakeRole = null;
let selectedTargetIndex = null;
let mafiaTargetIndex = null;
let maniacTargetIndex = null;
let commissionerTargetIndex = null;
let doctorTargetIndex = null;
let draggedIndex = null;
let currentOverIndex = null;
let dragFloatingCard = null;
let dragPlaceholder = null;
let dragStartOffsetX = 0;
let dragStartOffsetY = 0;

function makeDefaultPlayers(){
    return Array.from({length:10}, () => ({
        name:'',
        role:ROLE_CIVILIAN,
        alive:true
    }));
}

function normalizePlayers(list){
    if(!Array.isArray(list) || list.length === 0){
        return makeDefaultPlayers();
    }

    return list.map(player => ({
        name: typeof player.name === 'string' ? player.name : '',
        role: typeof player.role === 'string' ? player.role : ROLE_CIVILIAN,
        alive: player.alive !== false
    }));
}

function saveState(){
    try{
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
            players,
            gameStarted,
            gameStage,
            activeWakeRole,
            selectedTargetIndex,
            mafiaTargetIndex,
            maniacTargetIndex,
            commissionerTargetIndex,
            doctorTargetIndex
        }));
    }catch(error){}
}

function loadState(){
    try{
        const saved = localStorage.getItem(STORAGE_KEY);
        if(!saved){
            players = makeDefaultPlayers();
            return;
        }

        const state = JSON.parse(saved);
        players = normalizePlayers(state.players);
        gameStarted = Boolean(state.gameStarted);
        gameStage = state.gameStage || 'intro';
        activeWakeRole = state.activeWakeRole || null;
        selectedTargetIndex = Number.isInteger(state.selectedTargetIndex) ? state.selectedTargetIndex : null;
        mafiaTargetIndex = Number.isInteger(state.mafiaTargetIndex) ? state.mafiaTargetIndex : null;
        maniacTargetIndex = Number.isInteger(state.maniacTargetIndex) ? state.maniacTargetIndex : null;
        commissionerTargetIndex = Number.isInteger(state.commissionerTargetIndex) ? state.commissionerTargetIndex : null;
        doctorTargetIndex = Number.isInteger(state.doctorTargetIndex) ? state.doctorTargetIndex : null;
    }catch(error){
        players = makeDefaultPlayers();
        gameStarted = false;
        gameStage = 'intro';
        activeWakeRole = null;
        selectedTargetIndex = null;
        mafiaTargetIndex = null;
        maniacTargetIndex = null;
        commissionerTargetIndex = null;
        doctorTargetIndex = null;
    }
}

function escapeHtml(value){
    return String(value)
        .replaceAll('&','&amp;')
        .replaceAll('"','&quot;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;');
}

function getRoleOptions(selectedRole){
    const roles = [
        ROLE_CIVILIAN,
        ROLE_MAFIA,
        ROLE_COMMISSIONER,
        ROLE_DOCTOR,
        ROLE_MANIAC
    ];

    return roles.map(role => `<option value="${escapeHtml(role)}" ${role === selectedRole ? 'selected' : ''}>${escapeHtml(role)}</option>`).join('');
}

function getRoleName(role){
    return role.replace(/^.+?\s/, '');
}

function renderTable(){
    const table = document.getElementById('playersTable');
    table.querySelectorAll('.data-row').forEach(row => row.remove());

    players.forEach((player, index) => {
        const row = document.createElement('div');
        row.className = 'player-row data-row';
        row.dataset.index = String(index);

        const isActiveRole = gameStage === 'night' && activeWakeRole && player.role === activeWakeRole;
        const isTarget = gameStage === 'night' && selectedTargetIndex === index;

        if(isActiveRole){
            row.classList.add('role-highlight');
        }

        if(isTarget){
            row.classList.add('target-highlight');
        }

        row.innerHTML = `
            <div class="cell number-cell" data-click-target="${index}">${index + 1}</div>
            <div class="cell" data-click-target="${index}">
                <input
                    type="text"
                    value="${escapeHtml(player.name)}"
                    ${gameStarted ? 'disabled' : ''}
                    data-name-index="${index}"
                >
            </div>
            <div class="cell" data-click-target="${index}">
                <select ${gameStarted ? 'disabled' : ''} data-role-index="${index}">
                    ${getRoleOptions(player.role)}
                </select>
            </div>
            <div class="drag-cell">
                <div class="drag-handle" data-drag-index="${index}">☰</div>
            </div>
        `;

        table.appendChild(row);
    });

    updateChoiceButton();
}

function renderScreen(){
    const phaseTitle = document.getElementById('phaseTitle');
    const startButtons = document.getElementById('startButtons');
    const gameButtons = document.getElementById('gameButtons');
    const wakeBlock = document.getElementById('wakeBlock');
    const choiceBtn = document.getElementById('choiceBtn');

    if(!gameStarted){
        phaseTitle.textContent = 'Знакомство';
        startButtons.style.display = 'flex';
        gameButtons.style.display = 'none';
        wakeBlock.style.display = 'none';
    }else if(gameStage === 'day'){
        phaseTitle.textContent = 'Сейчас день';
        startButtons.style.display = 'none';
        gameButtons.style.display = 'flex';

        choiceBtn.textContent = 'Ночь';
        choiceBtn.disabled = false;
        choiceBtn.onclick = startNight;

        const hasHistory = mafiaTargetIndex !== null || maniacTargetIndex !== null || commissionerTargetIndex !== null || doctorTargetIndex !== null;
        wakeBlock.style.display = hasHistory ? 'block' : 'none';
        document.getElementById('wakeTitle').textContent = '';
        document.getElementById('actionText').textContent = '';
        renderChoiceHistory();
    }else if(gameStage === 'night'){
        phaseTitle.textContent = 'Сейчас ночь';
        startButtons.style.display = 'none';
        gameButtons.style.display = 'flex';
        wakeBlock.style.display = 'block';

        choiceBtn.textContent = 'Выбор';
        choiceBtn.onclick = confirmNightChoice;
        renderWakeText();
    }

    renderTable();
    saveState();
}

function renderWakeText(){
    const wakeTitle = document.getElementById('wakeTitle');
    const actionText = document.getElementById('actionText');

    if(activeWakeRole === ROLE_MAFIA){
        wakeTitle.textContent = 'Просыпается Мафия...';
        actionText.textContent = 'Мафия делает выбор (нажмите на игрока)';
    }else if(activeWakeRole === ROLE_MANIAC){
        wakeTitle.textContent = 'Просыпается Маньяк...';
        actionText.textContent = 'Маньяк делает выбор (нажмите на игрока)';
    }else if(activeWakeRole === ROLE_COMMISSIONER){
        wakeTitle.textContent = 'Просыпается Комиссар...';
        actionText.textContent = 'Комиссар делает выбор (нажмите на игрока)';
    }else if(activeWakeRole === ROLE_DOCTOR){
        wakeTitle.textContent = 'Просыпается Доктор...';
        actionText.textContent = 'Доктор делает выбор (нажмите на игрока)';
    }else{
        wakeTitle.textContent = '';
        actionText.textContent = '';
    }

    renderChoiceHistory();
}

function renderChoiceHistory(){
    const history = [];

    if(mafiaTargetIndex !== null && players[mafiaTargetIndex]){
        history.push(`— Мафия выбрала «${escapeHtml(players[mafiaTargetIndex].name)}»`);
    }

    if(maniacTargetIndex !== null && players[maniacTargetIndex]){
        history.push(`— Маньяк выбрал «${escapeHtml(players[maniacTargetIndex].name)}»`);
    }

    if(commissionerTargetIndex !== null && players[commissionerTargetIndex]){
        history.push(`— Комиссар выбрал «${escapeHtml(players[commissionerTargetIndex].name)}»`);
    }

    if(doctorTargetIndex !== null && players[doctorTargetIndex]){
        history.push(`— Доктор выбрал «${escapeHtml(players[doctorTargetIndex].name)}»`);
    }

    document.getElementById('choiceHistory').innerHTML = history.join('<br>');
}

function updateChoiceButton(){
    const choiceBtn = document.getElementById('choiceBtn');
    if(!choiceBtn){
        return;
    }

    if(gameStarted && gameStage === 'night'){
        choiceBtn.disabled = selectedTargetIndex === null;
    }
}

function updateName(index, value){
    if(players[index]){
        players[index].name = value;
        saveState();
    }
}

function updateRole(index, value){
    if(players[index]){
        players[index].role = value;
        saveState();
    }
}

function addRow(){
    if(gameStarted){
        return;
    }

    players.push({
        name:'',
        role:ROLE_CIVILIAN,
        alive:true
    });

    renderScreen();
}

function removeRow(){
    if(gameStarted || players.length <= 1){
        return;
    }

    players.pop();
    renderScreen();
}

function startDay(){
    const filledPlayers = players.filter(player => player.name.trim() !== '');

    if(filledPlayers.length > 0){
        players = filledPlayers;
    }

    gameStarted = true;
    gameStage = 'day';
    activeWakeRole = null;
    selectedTargetIndex = null;
    mafiaTargetIndex = null;
    maniacTargetIndex = null;
    commissionerTargetIndex = null;
    doctorTargetIndex = null;

    renderScreen();
}

function startNight(){
    gameStage = 'night';
    activeWakeRole = ROLE_MAFIA;
    selectedTargetIndex = null;
    mafiaTargetIndex = null;
    maniacTargetIndex = null;
    commissionerTargetIndex = null;
    doctorTargetIndex = null;

    renderScreen();
}

function startManiacWake(){
    activeWakeRole = ROLE_MANIAC;
    selectedTargetIndex = null;
    renderScreen();
}

function startCommissionerWake(){
    activeWakeRole = ROLE_COMMISSIONER;
    selectedTargetIndex = null;
    renderScreen();
}

function startDoctorWake(){
    activeWakeRole = ROLE_DOCTOR;
    selectedTargetIndex = null;
    renderScreen();
}

function startMorning(){
    gameStage = 'day';
    activeWakeRole = null;
    selectedTargetIndex = null;
    renderScreen();
}

function choosePlayer(index){
    if(gameStage !== 'night' || !activeWakeRole){
        return;
    }

    const player = players[index];
    if(!player){
        return;
    }

    if(player.role === activeWakeRole){
        return;
    }

    if(player.alive === false){
        return;
    }

    selectedTargetIndex = index;
    renderScreen();
}

function confirmNightChoice(){
    if(selectedTargetIndex === null){
        return;
    }

    if(activeWakeRole === ROLE_MAFIA){
        mafiaTargetIndex = selectedTargetIndex;

        if(hasRole(ROLE_MANIAC)){
            startManiacWake();
        }else if(hasRole(ROLE_COMMISSIONER)){
            startCommissionerWake();
        }else if(hasRole(ROLE_DOCTOR)){
            startDoctorWake();
        }else{
            startMorning();
        }

        return;
    }

    if(activeWakeRole === ROLE_MANIAC){
        maniacTargetIndex = selectedTargetIndex;

        if(hasRole(ROLE_COMMISSIONER)){
            startCommissionerWake();
        }else if(hasRole(ROLE_DOCTOR)){
            startDoctorWake();
        }else{
            startMorning();
        }

        return;
    }

    if(activeWakeRole === ROLE_COMMISSIONER){
        commissionerTargetIndex = selectedTargetIndex;

        if(hasRole(ROLE_DOCTOR)){
            startDoctorWake();
        }else{
            startMorning();
        }

        return;
    }

    if(activeWakeRole === ROLE_DOCTOR){
        doctorTargetIndex = selectedTargetIndex;
        startMorning();
    }
}

function hasRole(role){
    return players.some(player => player.role === role);
}

function openFinishModal(){
    document.getElementById('finishModal').style.display = 'flex';
}

function closeFinishModal(){
    document.getElementById('finishModal').style.display = 'none';
}

function finishGame(){
    gameStarted = false;
    gameStage = 'intro';
    activeWakeRole = null;
    selectedTargetIndex = null;
    mafiaTargetIndex = null;
    maniacTargetIndex = null;
    commissionerTargetIndex = null;
    doctorTargetIndex = null;

    players = players.map(player => ({
        name:player.name,
        role:ROLE_CIVILIAN,
        alive:true
    }));

    closeFinishModal();
    renderScreen();
}



function startDrag(event, index){
    if(gameStarted) return;

    event.preventDefault();

    const handle = event.target.closest('[data-drag-index]');
    const row = document.querySelector(`.data-row[data-index="${index}"]`);

    if(!handle || !row){
        return;
    }

    draggedIndex = index;
    currentOverIndex = index;

    const rect = row.getBoundingClientRect();

    dragStartOffsetX = event.clientX - rect.left;
    dragStartOffsetY = event.clientY - rect.top;

    dragFloatingCard = row.cloneNode(true);
    dragFloatingCard.classList.add('drag-floating-card');
    dragFloatingCard.style.width = rect.width + 'px';
    dragFloatingCard.style.height = rect.height + 'px';
    dragFloatingCard.style.transform = `translate3d(${rect.left}px, ${rect.top}px, 0)`;
    document.body.appendChild(dragFloatingCard);

    dragPlaceholder = document.createElement('div');
    dragPlaceholder.className = 'drag-placeholder';
    dragPlaceholder.style.height = rect.height + 'px';

    row.parentNode.insertBefore(dragPlaceholder, row);
    row.classList.add('dragging-source');

    handle.setPointerCapture(event.pointerId);
    handle.onpointermove = moveDrag;
    handle.onpointerup = endDrag;
    handle.onpointercancel = endDrag;
}

function moveDrag(event){
    if(draggedIndex === null || !dragFloatingCard || !dragPlaceholder){
        return;
    }

    const x = event.clientX - dragStartOffsetX;
    const y = event.clientY - dragStartOffsetY;
    dragFloatingCard.style.transform = `translate3d(${x}px, ${y}px, 0)`;

    const table = document.getElementById('playersTable');
    const rows = Array.from(table.querySelectorAll('.data-row:not(.dragging-source)'));

    let inserted = false;

    for(const row of rows){
        const rect = row.getBoundingClientRect();
        const middle = rect.top + rect.height / 2;

        if(event.clientY < middle){
            table.insertBefore(dragPlaceholder, row);
            inserted = true;
            break;
        }
    }

    if(!inserted){
        table.appendChild(dragPlaceholder);
    }

    const allSlots = Array.from(table.children).filter(item =>
        item.classList.contains('data-row') || item.classList.contains('drag-placeholder')
    );

    currentOverIndex = allSlots.indexOf(dragPlaceholder);
}

function endDrag(event){
    const handle = event.target.closest('[data-drag-index]') || event.target;

    try{
        handle.releasePointerCapture(event.pointerId);
    }catch(error){}

    handle.onpointermove = null;
    handle.onpointerup = null;
    handle.onpointercancel = null;

    const sourceRow = document.querySelector('.data-row.dragging-source');

    if(sourceRow){
        sourceRow.classList.remove('dragging-source');
    }

    if(dragFloatingCard){
        dragFloatingCard.remove();
        dragFloatingCard = null;
    }

    if(
        draggedIndex !== null &&
        currentOverIndex !== null
    ){
        let targetIndex = currentOverIndex;

        if(targetIndex > draggedIndex){
            targetIndex -= 1;
        }

        targetIndex = Math.max(0, Math.min(players.length - 1, targetIndex));

        if(targetIndex !== draggedIndex){
            const movedPlayer = players.splice(draggedIndex, 1)[0];
            players.splice(targetIndex, 0, movedPlayer);
        }
    }

    if(dragPlaceholder){
        dragPlaceholder.remove();
        dragPlaceholder = null;
    }

    draggedIndex = null;
    currentOverIndex = null;

    renderScreen();
}

function clearBrokenOldState(){
    const oldKeys = [
        'mafia_app_state_v1',
        'mafia_app_state_v2'
    ];

    oldKeys.forEach(key => localStorage.removeItem(key));
}

function bindEvents(){
    const topFinishBtn = document.getElementById('topFinishBtn');
    if(topFinishBtn){
        topFinishBtn.addEventListener('click', openFinishModal);
    }

    document.getElementById('addBtn').addEventListener('click', addRow);
    document.getElementById('removeBtn').addEventListener('click', removeRow);
    document.getElementById('startBtn').addEventListener('click', startDay);
    document.getElementById('finishBtn').addEventListener('click', openFinishModal);
    document.getElementById('finishYesBtn').addEventListener('click', finishGame);
    document.getElementById('finishNoBtn').addEventListener('click', closeFinishModal);

    document.getElementById('playersTable').addEventListener('input', event => {
        const index = event.target.dataset.nameIndex;
        if(index !== undefined){
            updateName(Number(index), event.target.value);
        }
    });

    document.getElementById('playersTable').addEventListener('change', event => {
        const index = event.target.dataset.roleIndex;
        if(index !== undefined){
            updateRole(Number(index), event.target.value);
        }
    });

    document.getElementById('playersTable').addEventListener('click', event => {
        const cell = event.target.closest('[data-click-target]');
        if(!cell){
            return;
        }

        choosePlayer(Number(cell.dataset.clickTarget));
    });

    document.getElementById('playersTable').addEventListener('pointerdown', event => {
        const handle = event.target.closest('[data-drag-index]');
        if(!handle){
            return;
        }

        startDrag(event, Number(handle.dataset.dragIndex));
    });
}

clearBrokenOldState();
bindEvents();
loadState();
renderScreen();
</script>
