<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мафия</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#d60000;
}

.table-wrap{
    width:100%;
}

.row-wrap{
    display:flex;
    align-items:stretch;
    margin-bottom:-1px;
}

table{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
}

th, td{
    border:1px solid #444;
    padding:8px;
    height:48px;
}

th{
    background:#222;
}

.col-number{
    width:32px;
    text-align:center;
}

.col-player{
    width:auto;
}

.col-role{
    width:170px;
}

input, select{
    width:100%;
    background:#1d1d1d;
    color:white;
    border:none;
    padding:8px;
    font-size:15px;
    outline:none;
}

input:disabled,
select:disabled{
    opacity:1;
    color:white;
    background:#1d1d1d;
}

.drag-btn{
    width:34px;
    margin-left:6px;
    border:1px solid #444;
    background:#1d1d1d;
    color:#aaa;
    font-size:20px;
    cursor:grab;
    touch-action:none;
    user-select:none;
    border-radius:6px;
}

.dragging{
    opacity:0.4;
}

.buttons{
    display:flex;
    gap:10px;
    margin-top:15px;
}

.main-btn{
    height:50px;
    font-size:24px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#d60000;
    color:white;
    padding:0 18px;
}

.small-btn{
    width:50px;
}

.play-btn{
    font-size:18px;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>Мафия</h1>

<div class="table-wrap">

    <div class="row-wrap">
        <table>
            <thead>
                <tr>
                    <th class="col-number">№</th>
                    <th class="col-player">Игрок</th>
                    <th class="col-role">Роль</th>
                </tr>
            </thead>
        </table>
        <div style="width:40px;margin-left:6px;"></div>
    </div>

    <div id="tableBody"></div>

</div>

<div class="buttons">
    <button class="main-btn small-btn" onclick="addRow()">+</button>
    <button class="main-btn small-btn" onclick="removeRow()">−</button>
    <button class="main-btn play-btn" onclick="startGame()">Играть</button>
</div>

<script>
let players = [];
let gameStarted = false;

let draggedIndex = null;
let currentOverIndex = null;

for(let i = 0; i < 10; i++){
    players.push({
        name: '',
        role: '👤 Мирный'
    });
}

function roleOptions(selectedRole){
    const roles = [
        '👤 Мирный',
        '🔫 Мафия',
        '⭐ Комиссар',
        '🚑 Доктор',
        '🔪 Маньяк'
    ];

    return roles.map(role => `
        <option ${role === selectedRole ? 'selected' : ''}>${role}</option>
    `).join('');
}

function renderTable(){
    const body = document.getElementById('tableBody');
    body.innerHTML = '';

    players.forEach((player, index) => {
        const rowWrap = document.createElement('div');
        rowWrap.className = 'row-wrap';
        rowWrap.dataset.index = index;

        rowWrap.innerHTML = `
            <table>
                <tbody>
                    <tr>
                        <td class="col-number">${index + 1}</td>
                        <td class="col-player">
                            <input
                                type="text"
                                value="${escapeHtml(player.name)}"
                                ${gameStarted ? 'disabled' : ''}
                                oninput="updateName(${index}, this.value)"
                            >
                        </td>
                        <td class="col-role">
                            <select 
                                ${gameStarted ? 'disabled' : ''}
                                onchange="updateRole(${index}, this.value)"
                            >
                                ${roleOptions(player.role)}
                            </select>
                        </td>
                    </tr>
                </tbody>
            </table>

            <button
                class="drag-btn"
                onpointerdown="startDrag(event, ${index})"
            >☰</button>
        `;

        body.appendChild(rowWrap);
    });
}

function escapeHtml(text){
    return text
        .replaceAll('&', '&amp;')
        .replaceAll('"', '&quot;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;');
}

function updateName(index, value){
    players[index].name = value;
}

function updateRole(index, value){
    players[index].role = value;
}

function addRow(){
    players.push({
        name: '',
        role: '👤 Мирный'
    });

    renderTable();
}

function removeRow(){
    if(players.length <= 1) return;

    players.pop();
    renderTable();
}

function startGame(){
    gameStarted = true;
    renderTable();
}

function startDrag(event, index){
    event.preventDefault();

    draggedIndex = index;

    const row = event.target.closest('.row-wrap');
    row.classList.add('dragging');

    event.target.setPointerCapture(event.pointerId);

    event.target.onpointermove = moveDrag;
    event.target.onpointerup = endDrag;
}

function moveDrag(event){
    const element = document.elementFromPoint(event.clientX, event.clientY);
    const row = element?.closest('.row-wrap');

    if(!row) return;

    currentOverIndex = Number(row.dataset.index);
}

function endDrag(event){
    event.target.releasePointerCapture(event.pointerId);

    event.target.onpointermove = null;
    event.target.onpointerup = null;

    if(
        draggedIndex !== null &&
        currentOverIndex !== null &&
        draggedIndex !== currentOverIndex
    ){
        const movedPlayer = players.splice(draggedIndex, 1)[0];
        players.splice(currentOverIndex, 0, movedPlayer);
    }

    draggedIndex = null;
    currentOverIndex = null;

    renderTable();
}

renderTable();
</script>

</body>
</html>
