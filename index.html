<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мафия</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#d60000;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-bottom:15px;
}

th, td{
    border:1px solid #444;
    padding:8px;
}

th{
    background:#222;
}

.col-number{
    width:38px;
    min-width:38px;
    max-width:38px;
    text-align:center;
}

.col-player{
    width:auto;
}

.col-role{
    width:180px;
}

input{
    width:100%;
    background:#1d1d1d;
    color:white;
    border:none;
    padding:8px;
    font-size:15px;
    outline:none;
}

select{
    width:100%;
    background:#1d1d1d;
    color:white;
    border:none;
    padding:8px;
    font-size:15px;
    outline:none;
}

.buttons{
    display:flex;
    gap:10px;
}

button{
    width:50px;
    height:50px;
    font-size:28px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#d60000;
    color:white;
}

button:hover{
    opacity:0.9;
}
</style>
</head>

<body>

<h1>Мафия</h1>

<table id="playersTable">
    <thead>
        <tr>
            <th class="col-number">№</th>
            <th class="col-player">Игрок</th>
            <th class="col-role">Роль</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<div class="buttons">
    <button onclick="addRow()">+</button>
    <button onclick="removeRow()">−</button>
</div>

<script>

let players = [];

for(let i = 0; i < 10; i++){
    players.push({
        name: '',
        role: '👤 Мирный'
    });
}

function roleOptions(selectedRole){

    const roles = [
        '👤 Мирный',
        '🔫 Мафия',
        '⭐ Комиссар',
        '🚑 Доктор',
        '🔪 Маньяк'
    ];

    return roles.map(role => `
        <option ${role === selectedRole ? 'selected' : ''}>
            ${role}
        </option>
    `).join('');
}

function renderTable(){

    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';

    players.forEach((player, index) => {

        const row = document.createElement('tr');

        row.innerHTML = `
            <td class="col-number">${index + 1}</td>

            <td>
                <input
                    type="text"
                    value="${player.name}"
                    oninput="updateName(${index}, this.value)"
                >
            </td>

            <td>
                <select onchange="updateRole(${index}, this.value)">
                    ${roleOptions(player.role)}
                </select>
            </td>
        `;

        tbody.appendChild(row);
    });
}

function updateName(index, value){
    players[index].name = value;
}

function updateRole(index, value){
    players[index].role = value;
}

function addRow(){

    players.push({
        name: '',
        role: '👤 Мирный'
    });

    renderTable();
}

function removeRow(){

    if(players.length <= 1){
        return;
    }

    players.pop();

    renderTable();
}

renderTable();

</script>

</body>
</html>
