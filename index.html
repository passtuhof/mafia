<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мафия</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#d60000;
}

.phase-title{
    color:white;
    font-size:22px;
    font-weight:600;
    padding-left:12px;
    border-left:4px solid #d60000;
    margin-bottom:20px;
}

.players-grid{
    display:flex;
    flex-direction:column;
}

.player-row{
    display:grid;
    grid-template-columns:34px minmax(0,1fr) 170px 34px;
    gap:0;
    align-items:stretch;
    margin-bottom:-1px;
}

.cell{
    border:1px solid #444;
    height:48px;
    display:flex;
    align-items:center;
    padding:8px;
    background:#111;
}

.header-cell{
    background:#222;
    justify-content:center;
    font-weight:bold;
}

.number-cell{
    justify-content:center;
}

.drag-handle{
    margin-left:6px;
    height:48px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#aaa;
    font-size:22px;
    user-select:none;
    touch-action:none;
    cursor:grab;
}

input,select{
    width:100%;
    background:#1d1d1d;
    color:white;
    border:none;
    padding:8px;
    font-size:15px;
    outline:none;
}

input:disabled,
select:disabled{
    opacity:1;
    color:white;
    background:#1d1d1d;
    pointer-events:none;
}

.buttons{
    display:flex;
    gap:10px;
    margin-top:15px;
}

.main-btn{
    height:50px;
    font-size:24px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#d60000;
    color:white;
    padding:0 18px;
}

.main-btn:disabled{
    background:#555;
    cursor:not-allowed;
}

.small-btn{width:50px;}

.start-btn,
.choice-btn,
.finish-btn{
    font-size:18px;
    font-weight:bold;
}

.wake-block{
    margin-top:18px;
}

.wake-title{
    font-size:20px;
    font-weight:600;
    margin-bottom:10px;
}

.action-text{
    color:#d60000;
    font-size:18px;
    font-weight:bold;
}

.choice-history{
    margin-top:14px;
    font-size:17px;
    color:white;
    line-height:1.5;
}

.role-highlight .cell{
    background:#e5c100 !important;
    color:#111 !important;
}

.role-highlight input,
.role-highlight select{
    background:#e5c100 !important;
    color:#111 !important;
}

.target-highlight .cell{
    background:#d60000 !important;
    color:white !important;
}

.target-highlight input,
.target-highlight select{
    background:#d60000 !important;
    color:white !important;
}

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.75);
    align-items:center;
    justify-content:center;
    z-index:999;
}

.modal-content{
    background:#1d1d1d;
    border:1px solid #444;
    border-radius:16px;
    padding:22px;
    width:90%;
    max-width:330px;
    text-align:center;
}

.modal-content p{
    font-size:22px;
    margin-bottom:20px;
}

.modal-buttons{
    display:flex;
    gap:10px;
}

.modal-buttons button{
    flex:1;
    height:48px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    color:white;
}

.yes-btn{background:#d60000;}
.no-btn{background:#333;}
</style>
</head>

<body>

<h1>Мафия</h1>

<div class="phase-title" id="phaseTitle">Знакомство</div>

<div class="players-grid" id="playersGrid">
    <div class="player-row">
        <div class="cell header-cell number-cell">№</div>
        <div class="cell header-cell">Игрок</div>
        <div class="cell header-cell">Роль</div>
        <div></div>
    </div>
</div>

<div class="buttons" id="startButtons">
    <button class="main-btn small-btn" onclick="addRow()">+</button>
    <button class="main-btn small-btn" onclick="removeRow()">−</button>
    <button class="main-btn start-btn" onclick="startDay()">Начать</button>
</div>

<div class="buttons" id="gameButtons" style="display:none;">
    <button class="main-btn choice-btn" id="choiceBtn" onclick="confirmNightChoice()" disabled>Выбор</button>
    <button class="main-btn finish-btn" onclick="openFinishModal()">Завершить</button>
</div>

<div class="wake-block" id="wakeBlock" style="display:none;">
    <div class="wake-title" id="wakeTitle"></div>
    <div class="action-text" id="actionText"></div>
    <div class="choice-history" id="choiceHistory"></div>
</div>

<div class="modal" id="finishModal">
    <div class="modal-content">
        <p>Завершить игру?</p>
        <div class="modal-buttons">
            <button class="yes-btn" onclick="finishGame()">Да</button>
            <button class="no-btn" onclick="closeFinishModal()">Нет</button>
        </div>
    </div>
</div>

<script>
const STORAGE_KEY = 'mafia_app_state_v1';

let players = [];
let gameStarted = false;
let gameStage = 'intro';

let draggedIndex = null;
let currentOverIndex = null;

let activeWakeRole = null;
let selectedTargetIndex = null;

let mafiaTargetIndex = null;
let maniacTargetIndex = null;
let commissionerTargetIndex = null;

function defaultPlayers(){
    return Array.from({length:10}, () => ({
        name:'',
        role:'👤 Мирный',
        alive:true
    }));
}

function saveState(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
        players,
        gameStarted,
        gameStage,
        activeWakeRole,
        selectedTargetIndex,
        mafiaTargetIndex,
        maniacTargetIndex,
        commissionerTargetIndex
    }));
}

function loadState(){
    const saved = localStorage.getItem(STORAGE_KEY);

    if(!saved){
        players = defaultPlayers();
        return;
    }

    try{
        const state = JSON.parse(saved);

        players = state.players || defaultPlayers();
        gameStarted = state.gameStarted || false;
        gameStage = state.gameStage || 'intro';
        activeWakeRole = state.activeWakeRole || null;
        selectedTargetIndex = state.selectedTargetIndex ?? null;
        mafiaTargetIndex = state.mafiaTargetIndex ?? null;
        maniacTargetIndex = state.maniacTargetIndex ?? null;
        commissionerTargetIndex = state.commissionerTargetIndex ?? null;
    }catch{
        players = defaultPlayers();
    }
}

function roleOptions(selectedRole){
    const roles = [
        '👤 Мирный',
        '🔫 Мафия',
        '⭐ Комиссар',
        '🚑 Доктор',
        '🔪 Маньяк'
    ];

    return roles.map(role => `
        <option ${role === selectedRole ? 'selected' : ''}>${role}</option>
    `).join('');
}

function renderTable(){
    const grid = document.getElementById('playersGrid');
    grid.querySelectorAll('.data-row').forEach(row => row.remove());

    players.forEach((player,index)=>{
        const wrapper = document.createElement('div');
        wrapper.className = 'player-row data-row';
        wrapper.dataset.index = index;

        const isActiveRole = activeWakeRole && player.role === activeWakeRole;
        const isTarget = selectedTargetIndex === index;

        wrapper.classList.toggle('role-highlight', isActiveRole);
        wrapper.classList.toggle('target-highlight', isTarget);

        wrapper.innerHTML = `
            <div class="cell number-cell" onclick="choosePlayer(${index})">${index + 1}</div>

            <div class="cell" onclick="choosePlayer(${index})">
                <input
                    type="text"
                    value="${escapeHtml(player.name)}"
                    ${gameStarted ? 'disabled' : ''}
                    oninput="updateName(${index}, this.value)"
                >
            </div>

            <div class="cell" onclick="choosePlayer(${index})">
                <select
                    ${gameStarted ? 'disabled' : ''}
                    onchange="updateRole(${index}, this.value)"
                >
                    ${roleOptions(player.role)}
                </select>
            </div>

            <div class="drag-handle" onpointerdown="startDrag(event, ${index})">☰</div>
        `;

        grid.appendChild(wrapper);
    });

    updateChoiceButton();
    saveState();
}

function renderScreen(){
    if(!gameStarted){
        document.getElementById('phaseTitle').textContent = 'Знакомство';
        document.getElementById('startButtons').style.display = 'flex';
        document.getElementById('gameButtons').style.display = 'none';
        document.getElementById('wakeBlock').style.display = 'none';
    }else if(gameStage === 'day'){
        document.getElementById('phaseTitle').textContent = 'Сейчас день';
        document.getElementById('startButtons').style.display = 'none';
        document.getElementById('gameButtons').style.display = 'flex';
        document.getElementById('wakeBlock').style.display = 'none';

        const btn = document.getElementById('choiceBtn');
        btn.textContent = 'Ночь';
        btn.disabled = false;
        btn.onclick = startNight;
    }else if(gameStage === 'night'){
        document.getElementById('phaseTitle').textContent = 'Сейчас ночь';
        document.getElementById('startButtons').style.display = 'none';
        document.getElementById('gameButtons').style.display = 'flex';
        document.getElementById('wakeBlock').style.display = 'block';

        const btn = document.getElementById('choiceBtn');
        btn.textContent = 'Выбор';
        btn.onclick = confirmNightChoice;

        renderWakeText();
    }

    renderTable();
}

function renderWakeText(){
    if(activeWakeRole === '🔫 Мафия'){
        document.getElementById('wakeTitle').textContent = 'Просыпается Мафия...';
        document.getElementById('actionText').textContent = 'Мафия делает выбор (нажмите на игрока)';
    }

    if(activeWakeRole === '🔪 Маньяк'){
        document.getElementById('wakeTitle').textContent = 'Просыпается Маньяк...';
        document.getElementById('actionText').textContent = 'Маньяк делает выбор (нажмите на игрока)';
    }

    if(activeWakeRole === '⭐ Комиссар'){
        document.getElementById('wakeTitle').textContent = 'Просыпается Комиссар...';
        document.getElementById('actionText').textContent = 'Комиссар делает выбор (нажмите на игрока)';
    }

    renderChoiceHistory();
}

function renderChoiceHistory(){
    const history = [];

    if(mafiaTargetIndex !== null && players[mafiaTargetIndex]){
        history.push(`— Мафия выбрала «${players[mafiaTargetIndex].name}»`);
    }

    if(maniacTargetIndex !== null && players[maniacTargetIndex]){
        history.push(`— Маньяк выбрал «${players[maniacTargetIndex].name}»`);
    }

    if(commissionerTargetIndex !== null && players[commissionerTargetIndex]){
        history.push(`— Комиссар выбрал «${players[commissionerTargetIndex].name}»`);
    }

    document.getElementById('choiceHistory').innerHTML = history.join('<br>');
}

function updateChoiceButton(){
    const btn = document.getElementById('choiceBtn');

    if(gameStage === 'night'){
        btn.disabled = selectedTargetIndex === null;
    }
}

function escapeHtml(text){
    return String(text)
        .replaceAll('&','&amp;')
        .replaceAll('"','&quot;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;');
}

function updateName(index,value){
    players[index].name = value;
    saveState();
}

function updateRole(index,value){
    players[index].role = value;
    saveState();
}

function addRow(){
    players.push({
        name:'',
        role:'👤 Мирный',
        alive:true
    });

    renderTable();
}

function removeRow(){
    if(players.length <= 1) return;

    players.pop();
    renderTable();
}

function startDay(){
    players = players.filter(player => player.name.trim() !== '');

    gameStarted = true;
    gameStage = 'day';
    activeWakeRole = null;
    selectedTargetIndex = null;
    mafiaTargetIndex = null;
    maniacTargetIndex = null;
    commissionerTargetIndex = null;

    renderScreen();
}

function startNight(){
    gameStage = 'night';
    document.getElementById('phaseTitle').textContent = 'Сейчас ночь';

    startMafiaWake();
}

function startMafiaWake(){
    activeWakeRole = '🔫 Мафия';
    selectedTargetIndex = null;

    renderWakeText();
    renderScreen();
}

function startManiacWake(){
    activeWakeRole = '🔪 Маньяк';
    selectedTargetIndex = null;

    renderWakeText();
    renderScreen();
}

function startCommissionerWake(){
    activeWakeRole = '⭐ Комиссар';
    selectedTargetIndex = null;

    renderWakeText();
    renderScreen();
}

function choosePlayer(index){
    if(gameStage !== 'night') return;
    if(!activeWakeRole) return;

    const player = players[index];

    if(player.role === activeWakeRole) return;
    if(player.alive === false) return;

    selectedTargetIndex = index;
    renderTable();
}

function confirmNightChoice(){
    if(selectedTargetIndex === null) return;

    if(activeWakeRole === '🔫 Мафия'){
        mafiaTargetIndex = selectedTargetIndex;

        if(hasRole('🔪 Маньяк')){
            startManiacWake();
        }else if(hasRole('⭐ Комиссар')){
            startCommissionerWake();
        }else{
            startMorning();
        }

        return;
    }

    if(activeWakeRole === '🔪 Маньяк'){
        maniacTargetIndex = selectedTargetIndex;

        if(hasRole('⭐ Комиссар')){
            startCommissionerWake();
        }else{
            startMorning();
        }

        return;
    }

    if(activeWakeRole === '⭐ Комиссар'){
        commissionerTargetIndex = selectedTargetIndex;
        startMorning();
    }
}

function hasRole(role){
    return players.some(player => player.role === role);
}

function startMorning(){
    gameStage = 'day';
    activeWakeRole = null;
    selectedTargetIndex = null;

    renderScreen();
}

function openFinishModal(){
    document.getElementById('finishModal').style.display = 'flex';
}

function closeFinishModal(){
    document.getElementById('finishModal').style.display = 'none';
}

function finishGame(){
    gameStarted = false;
    gameStage = 'intro';
    activeWakeRole = null;
    selectedTargetIndex = null;
    mafiaTargetIndex = null;
    maniacTargetIndex = null;
    commissionerTargetIndex = null;

    players = players.map(player => ({
        name:player.name,
        role:'👤 Мирный',
        alive:true
    }));

    closeFinishModal();
    renderScreen();
}

function startDrag(event,index){
    if(gameStarted) return;

    event.preventDefault();

    draggedIndex = index;

    const rows = document.querySelectorAll('.data-row');
    rows[index]?.style.opacity = '0.4';

    event.target.setPointerCapture(event.pointerId);

    event.target.onpointermove = moveDrag;
    event.target.onpointerup = endDrag;
}

function moveDrag(event){
    const rows = Array.from(document.querySelectorAll('.data-row'));
    let foundIndex = null;

    rows.forEach((row,index)=>{
        const rect = row.getBoundingClientRect();

        if(event.clientY >= rect.top && event.clientY <= rect.bottom){
            foundIndex = index;
        }
    });

    if(foundIndex !== null){
        currentOverIndex = foundIndex;
    }
}

function endDrag(event){
    event.target.releasePointerCapture(event.pointerId);

    event.target.onpointermove = null;
    event.target.onpointerup = null;

    if(
        draggedIndex !== null &&
        currentOverIndex !== null &&
        draggedIndex !== currentOverIndex
    ){
        const movedPlayer = players.splice(draggedIndex,1)[0];
        players.splice(currentOverIndex,0,movedPlayer);
    }

    draggedIndex = null;
    currentOverIndex = null;

    renderTable();
}

loadState();
renderScreen();
</script>

</body>
</html>
