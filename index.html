<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мафия</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#d60000;
}

.phase-title{
    color:white;
    font-size:22px;
    font-weight:600;
    padding-left:12px;
    border-left:4px solid #d60000;
    margin-bottom:20px;
}

.players-grid{
    display:flex;
    flex-direction:column;
}

.player-row{
    display:grid;
    grid-template-columns:minmax(0,1fr) 34px;
    gap:6px;
    align-items:stretch;
    margin-bottom:-1px;
}

.player-row > table{
    min-width:0;
}

table{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
}

th,td{
    border:1px solid #444;
    padding:8px;
    height:48px;
}

th{
    background:#222;
    text-align:center;
}

.col-number{
    width:34px;
    text-align:center;
}

.col-role{
    width:170px;
}

input,select{
    width:100%;
    background:#1d1d1d;
    color:white;
    border:none;
    padding:8px;
    font-size:15px;
    outline:none;
}

input:disabled,
select:disabled{
    opacity:1;
    color:white;
    background:#1d1d1d;
    pointer-events:none;
}

.drag-handle{
    display:flex;
    align-items:center;
    justify-content:center;
    color:#aaa;
    font-size:22px;
    user-select:none;
    touch-action:none;
    cursor:grab;
    height:48px;
}

.dragging-row{
    opacity:0.4;
}

.buttons{
    display:flex;
    gap:10px;
    margin-top:15px;
}

.main-btn{
    height:50px;
    font-size:24px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#d60000;
    color:white;
    padding:0 18px;
}

.main-btn:disabled{
    background:#555;
    cursor:not-allowed;
}

.small-btn{
    width:50px;
}

.day-btn,
.night-btn,
.finish-btn,
.choice-btn{
    font-size:18px;
    font-weight:bold;
}

.wake-block{
    margin-top:18px;
}

.wake-title{
    font-size:20px;
    font-weight:600;
    margin-bottom:10px;
}

.action-text{
    color:#d60000;
    font-size:18px;
    font-weight:bold;
}

.role-highlight td{
    background:#e5c100 !important;
    color:#111 !important;
}

.role-highlight input,
.role-highlight select{
    background:#e5c100 !important;
    color:#111 !important;
}

.target-highlight td{
    background:#d60000 !important;
    color:white !important;
}

.target-highlight input,
.target-highlight select{
    background:#d60000 !important;
    color:white !important;
}

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.75);
    align-items:center;
    justify-content:center;
    z-index:999;
}

.modal-content{
    background:#1d1d1d;
    border:1px solid #444;
    border-radius:16px;
    padding:22px;
    width:90%;
    max-width:330px;
    text-align:center;
}

.modal-content p{
    font-size:22px;
    margin-bottom:20px;
}

.modal-buttons{
    display:flex;
    gap:10px;
}

.modal-buttons button{
    flex:1;
    height:48px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    color:white;
}

.yes-btn{background:#d60000;}
.no-btn{background:#333;}
</style>
</head>

<body>

<h1>Мафия</h1>

<div class="phase-title" id="phaseTitle">Знакомство</div>

<div class="players-grid" id="playersGrid">
    <div class="player-row">
        <table>
            <thead>
                <tr>
                    <th class="col-number">№</th>
                    <th>Игрок</th>
                    <th class="col-role">Роль</th>
                </tr>
            </thead>
        </table>
        <div></div>
    </div>
</div>

<div class="buttons" id="startButtons">
    <button class="main-btn small-btn" onclick="addRow()">+</button>
    <button class="main-btn small-btn" onclick="removeRow()">−</button>
    <button class="main-btn day-btn" onclick="startDay()">День</button>
</div>

<div class="buttons" id="gameButtons" style="display:none;">
    <button class="main-btn choice-btn" id="choiceBtn" onclick="confirmNightChoice()" disabled>Выбор</button>
    <button class="main-btn finish-btn" onclick="openFinishModal()">Завершить</button>
</div>

<div class="wake-block" id="wakeBlock" style="display:none;">
    <div class="wake-title" id="wakeTitle">Просыпается Мафия...</div>
    <div class="action-text" id="actionText">Мафия делает выбор (нажмите на игрока)</div>
</div>

<div class="modal" id="finishModal">
    <div class="modal-content">
        <p>Завершить игру?</p>
        <div class="modal-buttons">
            <button class="yes-btn" onclick="finishGame()">Да</button>
            <button class="no-btn" onclick="closeFinishModal()">Нет</button>
        </div>
    </div>
</div>

<script>
let players = [];
let gameStarted = false;
let gameStage = 'intro';

let draggedIndex = null;
let currentOverIndex = null;

let activeWakeRole = null;
let selectedTargetIndex = null;

let mafiaTargetIndex = null;
let maniacTargetIndex = null;

for(let i = 0; i < 10; i++){
    players.push({
        name:'',
        role:'👤 Мирный',
        alive:true
    });
}

function roleOptions(selectedRole){
    const roles = [
        '👤 Мирный',
        '🔫 Мафия',
        '⭐ Комиссар',
        '🚑 Доктор',
        '🔪 Маньяк'
    ];

    return roles.map(role => `
        <option ${role === selectedRole ? 'selected' : ''}>${role}</option>
    `).join('');
}

function renderTable(){
    const grid = document.getElementById('playersGrid');
    grid.querySelectorAll('.data-row').forEach(row => row.remove());

    players.forEach((player,index)=>{
        const wrapper = document.createElement('div');
        wrapper.className = 'player-row data-row';
        wrapper.dataset.index = index;

        const isActiveRole =
            activeWakeRole &&
            player.role === activeWakeRole;

        const isTarget = selectedTargetIndex === index;

        wrapper.innerHTML = `
            <table>
                <tbody>
                    <tr 
                        class="${isActiveRole ? 'role-highlight' : ''} ${isTarget ? 'target-highlight' : ''}"
                        onclick="choosePlayer(${index})"
                    >
                        <td class="col-number">${index + 1}</td>

                        <td>
                            <input
                                type="text"
                                value="${escapeHtml(player.name)}"
                                ${gameStarted ? 'disabled' : ''}
                                oninput="updateName(${index}, this.value)"
                            >
                        </td>

                        <td>
                            <select
                                ${gameStarted ? 'disabled' : ''}
                                onchange="updateRole(${index}, this.value)"
                            >
                                ${roleOptions(player.role)}
                            </select>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div class="drag-handle" onpointerdown="startDrag(event, ${index})">☰</div>
        `;

        grid.appendChild(wrapper);
    });
}

function escapeHtml(text){
    return text
        .replaceAll('&','&amp;')
        .replaceAll('"','&quot;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;');
}

function updateName(index,value){
    players[index].name = value;
}

function updateRole(index,value){
    players[index].role = value;
}

function addRow(){
    players.push({
        name:'',
        role:'👤 Мирный',
        alive:true
    });

    renderTable();
}

function removeRow(){
    if(players.length <= 1) return;

    players.pop();
    renderTable();
}

function startDay(){
    players = players.filter(player => player.name.trim() !== '');

    gameStarted = true;
    gameStage = 'day';
    activeWakeRole = null;
    selectedTargetIndex = null;

    document.getElementById('phaseTitle').textContent = 'Сейчас день';
    document.getElementById('startButtons').style.display = 'none';
    document.getElementById('gameButtons').style.display = 'flex';
    document.getElementById('wakeBlock').style.display = 'none';

    document.getElementById('choiceBtn').textContent = 'Ночь';
    document.getElementById('choiceBtn').disabled = false;
    document.getElementById('choiceBtn').onclick = startNight;

    renderTable();
}

function startNight(){
    gameStage = 'night';

    document.getElementById('phaseTitle').textContent = 'Сейчас ночь';
    document.getElementById('wakeBlock').style.display = 'block';

    startMafiaWake();
}

function startMafiaWake(){
    activeWakeRole = '🔫 Мафия';
    selectedTargetIndex = null;

    document.getElementById('wakeTitle').textContent = 'Просыпается Мафия...';
    document.getElementById('actionText').textContent = 'Мафия делает выбор (нажмите на игрока)';

    const choiceBtn = document.getElementById('choiceBtn');
    choiceBtn.textContent = 'Выбор';
    choiceBtn.disabled = true;
    choiceBtn.onclick = confirmNightChoice;

    renderTable();
}

function startManiacWake(){
    activeWakeRole = '🔪 Маньяк';
    selectedTargetIndex = null;

    document.getElementById('wakeTitle').textContent = 'Просыпается Маньяк...';
    document.getElementById('actionText').textContent = 'Маньяк делает выбор (нажмите на игрока)';

    const choiceBtn = document.getElementById('choiceBtn');
    choiceBtn.textContent = 'Выбор';
    choiceBtn.disabled = true;
    choiceBtn.onclick = confirmNightChoice;

    renderTable();
}

function choosePlayer(index){
    if(gameStage !== 'night') return;
    if(!activeWakeRole) return;

    const player = players[index];

    if(player.role === activeWakeRole) return;
    if(player.alive === false) return;

    selectedTargetIndex = index;

    const choiceBtn = document.getElementById('choiceBtn');
    choiceBtn.disabled = false;

    renderTable();
}

function confirmNightChoice(){
    if(selectedTargetIndex === null) return;

    if(activeWakeRole === '🔫 Мафия'){
        mafiaTargetIndex = selectedTargetIndex;

        if(hasRole('🔪 Маньяк')){
            startManiacWake();
        }else{
            startMorning();
        }

        return;
    }

    if(activeWakeRole === '🔪 Маньяк'){
        maniacTargetIndex = selectedTargetIndex;
        startMorning();
    }
}

function hasRole(role){
    return players.some(player => player.role === role);
}

function startMorning(){
    gameStage = 'day';
    activeWakeRole = null;
    selectedTargetIndex = null;

    document.getElementById('phaseTitle').textContent = 'Сейчас день';
    document.getElementById('wakeBlock').style.display = 'none';

    const choiceBtn = document.getElementById('choiceBtn');
    choiceBtn.textContent = 'Ночь';
    choiceBtn.disabled = false;
    choiceBtn.onclick = startNight;

    renderTable();
}

function openFinishModal(){
    document.getElementById('finishModal').style.display = 'flex';
}

function closeFinishModal(){
    document.getElementById('finishModal').style.display = 'none';
}

function finishGame(){
    gameStarted = false;
    gameStage = 'intro';
    activeWakeRole = null;
    selectedTargetIndex = null;
    mafiaTargetIndex = null;
    maniacTargetIndex = null;

    players = players.map(player => ({
        name:player.name,
        role:'👤 Мирный',
        alive:true
    }));

    document.getElementById('phaseTitle').textContent = 'Знакомство';
    document.getElementById('startButtons').style.display = 'flex';
    document.getElementById('gameButtons').style.display = 'none';
    document.getElementById('wakeBlock').style.display = 'none';

    closeFinishModal();
    renderTable();
}

function startDrag(event,index){
    if(gameStarted) return;

    event.preventDefault();

    draggedIndex = index;

    const rows = document.querySelectorAll('.data-row');
    rows[index]?.classList.add('dragging-row');

    event.target.setPointerCapture(event.pointerId);

    event.target.onpointermove = moveDrag;
    event.target.onpointerup = endDrag;
}

function moveDrag(event){
    const rows = Array.from(document.querySelectorAll('.data-row'));
    let foundIndex = null;

    rows.forEach((row,index)=>{
        const rect = row.getBoundingClientRect();

        if(event.clientY >= rect.top && event.clientY <= rect.bottom){
            foundIndex = index;
        }
    });

    if(foundIndex !== null){
        currentOverIndex = foundIndex;
    }
}

function endDrag(event){
    event.target.releasePointerCapture(event.pointerId);

    event.target.onpointermove = null;
    event.target.onpointerup = null;

    if(
        draggedIndex !== null &&
        currentOverIndex !== null &&
        draggedIndex !== currentOverIndex
    ){
        const movedPlayer = players.splice(draggedIndex,1)[0];
        players.splice(currentOverIndex,0,movedPlayer);
    }

    draggedIndex = null;
    currentOverIndex = null;

    renderTable();
}

renderTable();
</script>

</body>
</html>
