<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мафия</title>
<!-- drag-fix-no-placeholder-number: no numbering in placeholder, no instant number change -->
<!-- compact-number-preview-drag: lower cards + live numbering during drag -->
<!-- cards-smooth-sort: cards UI + placeholder drag -->
<!-- history-refresh-fix: day summary persists after reload -->
<!-- columns-fixed: role 150px -->

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    padding:20px;
}

h1{
    text-align:center;
    color:#d60000;
    margin:0;
}

.top-header{
    display:grid;
    grid-template-columns:40px 1fr 40px;
    align-items:center;
    margin-bottom:20px;
}

.top-spacer{
    width:40px;
    height:40px;
}

.top-finish-btn{
    width:40px;
    height:40px;
    border:none;
    background:transparent;
    color:#d60000;
    font-size:22px;
    cursor:pointer;
    padding:0;
}

.phase-title{
    color:white;
    font-size:22px;
    font-weight:600;
    padding-left:12px;
    border-left:4px solid #d60000;
    margin-bottom:20px;
}

.players-table{
    width:100%;
    display:flex;
    flex-direction:column;
    gap:8px;
}

.header-row{
    display:none !important;
}

.player-row{
    display:grid;
    grid-template-columns:28px minmax(0,1fr) 138px 28px;
    align-items:center;
    gap:8px;
    min-height:38px;
    padding:7px 8px;
    margin-bottom:0;
    background:linear-gradient(180deg,#1b1b1b,#141414);
    border:1px solid #333;
    border-radius:14px;
    box-shadow:0 6px 18px rgba(0,0,0,0.22);
}

.cell{
    min-height:26px;
    border:none;
    display:flex;
    align-items:center;
    padding:0;
    background:transparent;
    overflow:hidden;
}

.header-cell{
    background:transparent;
    justify-content:center;
    font-weight:bold;
}

.number-cell{
    width:22px;
    height:auto;
    justify-content:center;
    text-align:center;
    border:none;
    border-radius:0;
    background:transparent;
    color:white;
    font-weight:700;
    font-size:13px;
    flex-shrink:0;
}

.drag-cell{
    border:none;
    background:transparent;
    padding:0;
    display:flex;
    align-items:center;
    justify-content:center;
}

.drag-handle{
    height:30px;
    width:26px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#aaa;
    font-size:20px;
    user-select:none;
    touch-action:none;
    cursor:grab;
}

.drag-handle:active{
    cursor:grabbing;
}

input,select{
    width:100%;
    min-height:30px;
    background:#222;
    color:white;
    border:1px solid #2d2d2d;
    padding:7px 9px;
    font-size:14px;
    outline:none;
    border-radius:9px;
}

input:disabled,
select:disabled{
    opacity:1;
    color:white;
    background:#222;
    pointer-events:none;
}

.buttons{
    display:flex;
    gap:10px;
    margin-top:15px;
    flex-wrap:nowrap;
}

.main-btn{
    height:50px;
    font-size:24px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#d60000;
    color:white;
    padding:0 14px;
    white-space:nowrap;
}

.main-btn:disabled{
    background:#555;
    cursor:not-allowed;
}

select option:disabled{
    color:#777;
    background:#2a2a2a;
}

.small-btn{
    width:50px;
    padding:0;
}

.start-btn,
.choice-btn,
.finish-btn{
    font-size:18px;
    font-weight:bold;
}

.wake-block{
    margin-top:18px;
}

.wake-title{
    font-size:20px;
    font-weight:600;
    margin-bottom:10px;
}

.action-text{
    color:#d60000;
    font-size:18px;
    font-weight:bold;
}

.choice-history{
    margin-top:14px;
    font-size:17px;
    color:white;
    line-height:1.5;
}

.role-highlight .cell:not(.drag-cell){
    background:#e5c100 !important;
    color:#111 !important;
}

.role-highlight input,
.role-highlight select{
    background:#e5c100 !important;
    color:#111 !important;
}

.target-highlight .cell:not(.drag-cell){
    background:#d60000 !important;
    color:white !important;
}

.target-highlight input,
.target-highlight select{
    background:#d60000 !important;
    color:white !important;
}

.green-target-highlight .cell:not(.drag-cell){
    background:#2ecc71 !important;
    color:#111 !important;
}

.green-target-highlight input,
.green-target-highlight select{
    background:#2ecc71 !important;
    color:#111 !important;
}

.dead-player .cell:not(.drag-cell){
    background:#555 !important;
    color:white !important;
}

.dead-player input,
.dead-player select{
    background:#555 !important;
    color:white !important;
}

.doctor-forbidden .cell:not(.drag-cell){
    opacity:0.55;
}

.doctor-forbidden input,
.doctor-forbidden select{
    opacity:1;
}

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.75);
    align-items:center;
    justify-content:center;
    z-index:999;
}

.modal-content{
    background:#1d1d1d;
    border:1px solid #444;
    border-radius:16px;
    padding:22px;
    width:90%;
    max-width:330px;
    text-align:center;
}

.modal-content p{
    font-size:22px;
    margin-bottom:20px;
}

.modal-buttons{
    display:flex;
    gap:10px;
}

.modal-buttons button{
    flex:1;
    height:48px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    color:white;
}

.yes-btn{background:#d60000;}
.no-btn{background:#333;}

#finishBtn{
    display:none !important;
}


/* cards UI */
.role-highlight{
    background:#e5c100 !important;
    color:#111 !important;
    border-color:#e5c100 !important;
}

.role-highlight .number-cell,
.role-highlight input,
.role-highlight select{
    background:#e5c100 !important;
    color:#111 !important;
    border-color:rgba(0,0,0,0.25) !important;
}

.target-highlight{
    background:#d60000 !important;
    color:white !important;
    border-color:#d60000 !important;
}

.target-highlight .number-cell,
.target-highlight input,
.target-highlight select{
    background:#d60000 !important;
    color:white !important;
    border-color:rgba(255,255,255,0.25) !important;
}

.green-target-highlight{
    background:#2ecc71 !important;
    color:#111 !important;
    border-color:#2ecc71 !important;
}

.green-target-highlight .number-cell,
.green-target-highlight input,
.green-target-highlight select{
    background:#2ecc71 !important;
    color:#111 !important;
    border-color:rgba(0,0,0,0.25) !important;
}

.dead-player{
    background:#555 !important;
    border-color:#666 !important;
}

.dead-player .number-cell,
.dead-player input,
.dead-player select{
    background:#555 !important;
    color:white !important;
    border-color:#666 !important;
}

/* smooth card drag */
.drag-placeholder{
    min-height:38px;
    border:2px dashed #d60000;
    border-radius:14px;
    background:rgba(214,0,0,0.12);
    transition:all 0.16s ease;
}

.dragging-source{
    display:none !important;
}

.drag-floating-card{
    position:fixed;
    left:0;
    top:0;
    z-index:5000;
    pointer-events:none;
    transform:translate3d(0,0,0);
    transition:none !important;
    box-shadow:0 18px 40px rgba(0,0,0,0.55) !important;
    opacity:0.96;
}


.drag-placeholder{
    min-height:38px;
    border:2px dashed #d60000;
    border-radius:14px;
    background:rgba(214,0,0,0.12);
    transition:all 0.16s ease;
}
</style>
</head>

<body>

<div class="top-header">
    <div class="top-spacer"></div>
    <h1>Мафия</h1>
    <button id="topFinishBtn" class="top-finish-btn" type="button">❌</button>
</div>

<div class="phase-title" id="phaseTitle">Знакомство</div>

<div class="players-table" id="playersTable">
    <div class="player-row header-row">
        <div class="cell header-cell number-cell">№</div>
        <div class="cell header-cell">Игрок</div>
        <div class="cell header-cell">Роль</div>
        <div class="drag-cell"></div>
    </div>
</div>

<div class="buttons" id="startButtons">
    <button class="main-btn small-btn" id="addBtn">+</button>
    <button class="main-btn small-btn" id="removeBtn">−</button>
    <button class="main-btn start-btn" id="startBtn">Начать</button>
</div>

<div class="buttons" id="gameButtons" style="display:none;">
    <button class="main-btn choice-btn" id="choiceBtn" disabled>Выбор</button>
    <button class="main-btn finish-btn" id="finishBtn">Завершить</button>
</div>

<div class="wake-block" id="wakeBlock" style="display:none;">
    <div class="wake-title" id="wakeTitle"></div>
    <div class="action-text" id="actionText"></div>
    <div class="choice-history" id="choiceHistory"></div>
</div>

<div class="modal" id="finishModal">
    <div class="modal-content">
        <p>Завершить игру?</p>
        <div class="modal-buttons">
            <button class="yes-btn" id="finishYesBtn">Да</button>
            <button class="no-btn" id="finishNoBtn">Нет</button>
        </div>
    </div>
</div>

<script>
const STORAGE_KEY = 'mafia_app_state_stable_v1';

const ROLE_CIVILIAN = '👤 Мирный';
const ROLE_MAFIA = '🔫 Мафия';
const ROLE_COMMISSIONER = '🔍 Комиссар';
const ROLE_DOCTOR = '💉 Доктор';
const ROLE_MANIAC = '🔪 Маньяк';

let players = [];
let gameStarted = false;
let gameStage = 'intro';

let activeWakeRole = null;
let selectedTargetIndex = null;
let nightSkipped = false;
let votingTargetIndex = null;

let mafiaTargetIndex = null;
let maniacTargetIndex = null;
let commissionerTargetIndex = null;
let doctorTargetIndex = null;
let previousDoctorTargetIndex = null;

let draggedIndex = null;
let currentOverIndex = null;
let dragFloatingCard = null;
let dragPlaceholder = null;
let dragMoved = false;
let dragStartOffsetX = 0;
let dragStartOffsetY = 0;

function makeDefaultPlayers(){
    return Array.from({length:10}, () => ({
        name:'',
        role:ROLE_CIVILIAN,
        alive:true
    }));
}

function normalizeRole(role){
    if(role === '⭐ Комиссар') return ROLE_COMMISSIONER;
    if(role === '🚑 Доктор') return ROLE_DOCTOR;
    return role;
}

function normalizePlayers(list){
    if(!Array.isArray(list) || list.length === 0){
        return makeDefaultPlayers();
    }

    return list.map(player => ({
        name: typeof player.name === 'string' ? player.name : '',
        role: normalizeRole(typeof player.role === 'string' ? player.role : ROLE_CIVILIAN),
        alive: player.alive !== false
    }));
}

function saveState(){
    try{
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
            players,
            gameStarted,
            gameStage,
            activeWakeRole,
            selectedTargetIndex,
            votingTargetIndex,
            mafiaTargetIndex,
            maniacTargetIndex,
            commissionerTargetIndex,
            doctorTargetIndex,
            previousDoctorTargetIndex
        }));
    }catch(error){}
}

function loadState(){
    try{
        const saved = localStorage.getItem(STORAGE_KEY);

        if(!saved){
            players = makeDefaultPlayers();
            return;
        }

        const state = JSON.parse(saved);

        players = normalizePlayers(state.players);
        gameStarted = Boolean(state.gameStarted);
        gameStage = state.gameStage || 'intro';
        activeWakeRole = normalizeRole(state.activeWakeRole || null);
        selectedTargetIndex = Number.isInteger(state.selectedTargetIndex) ? state.selectedTargetIndex : null;
        nightSkipped = Boolean(state.nightSkipped);
        votingTargetIndex = Number.isInteger(state.votingTargetIndex) ? state.votingTargetIndex : null;
        votingTargetIndex = Number.isInteger(state.votingTargetIndex) ? state.votingTargetIndex : null;
        mafiaTargetIndex = Number.isInteger(state.mafiaTargetIndex) ? state.mafiaTargetIndex : null;
        maniacTargetIndex = Number.isInteger(state.maniacTargetIndex) ? state.maniacTargetIndex : null;
        commissionerTargetIndex = Number.isInteger(state.commissionerTargetIndex) ? state.commissionerTargetIndex : null;
        doctorTargetIndex = Number.isInteger(state.doctorTargetIndex) ? state.doctorTargetIndex : null;
        previousDoctorTargetIndex = Number.isInteger(state.previousDoctorTargetIndex) ? state.previousDoctorTargetIndex : null;
    }catch(error){
        players = makeDefaultPlayers();
        gameStarted = false;
        gameStage = 'intro';
        activeWakeRole = null;
        selectedTargetIndex = null;
        votingTargetIndex = null;
        mafiaTargetIndex = null;
        maniacTargetIndex = null;
        commissionerTargetIndex = null;
        doctorTargetIndex = null;
        previousDoctorTargetIndex = null;
    }
}

function getPlayerNameByIndex(index){
    return players[index] ? escapeHtml(players[index].name) : '';
}

function escapeHtml(value){
    return String(value)
        .replaceAll('&','&amp;')
        .replaceAll('"','&quot;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;');
}

function getRoleOptions(selectedRole, playerIndex){
    const roles = [
        ROLE_CIVILIAN,
        ROLE_MAFIA,
        ROLE_COMMISSIONER,
        ROLE_DOCTOR,
        ROLE_MANIAC
    ];

    const commissionerTakenByOther = players.some((player, index) =>
        index !== playerIndex && player.role === ROLE_COMMISSIONER
    );

    const doctorTakenByOther = players.some((player, index) =>
        index !== playerIndex && player.role === ROLE_DOCTOR
    );

    return roles.map(role => {
        const shouldDisable =
            (role === ROLE_COMMISSIONER && commissionerTakenByOther && selectedRole !== ROLE_COMMISSIONER) ||
            (role === ROLE_DOCTOR && doctorTakenByOther && selectedRole !== ROLE_DOCTOR);

        return `<option value="${escapeHtml(role)}" ${role === selectedRole ? 'selected' : ''} ${shouldDisable ? 'disabled' : ''}>${escapeHtml(role)}</option>`;
    }).join('');
}

function renderTable(){
    const table = document.getElementById('playersTable');
    table.querySelectorAll('.data-row').forEach(row => row.remove());

    players.forEach((player, index) => {
        const row = document.createElement('div');
        row.className = 'player-row data-row';
        row.dataset.index = String(index);

        const isActiveRole = gameStage === 'night' && activeWakeRole && player.role === activeWakeRole;
        const isTarget = (gameStage === 'night' && selectedTargetIndex === index) || (gameStage === 'voting' && votingTargetIndex === index);
        const isDead = player.alive === false;
        const isDoctorForbidden = gameStage === 'night' && activeWakeRole === ROLE_DOCTOR && previousDoctorTargetIndex === index;

        if(isDoctorForbidden) row.classList.add('doctor-forbidden');
        if(isDead) row.classList.add('dead-player');
        if(isActiveRole) row.classList.add('role-highlight');

        if(isTarget){
            if(activeWakeRole === ROLE_COMMISSIONER || activeWakeRole === ROLE_DOCTOR){
                row.classList.add('green-target-highlight');
            }else{
                row.classList.add('target-highlight');
            }
        }

        row.innerHTML = `
            <div class="cell number-cell" data-click-target="${index}">${player.alive === false ? '☠️' : index + 1}</div>
            <div class="cell" data-click-target="${index}">
                <input
                    
                    type="text"
                    value="${escapeHtml(player.name)}"
                    ${gameStarted ? 'disabled' : ''}
                    data-name-index="${index}"
                >
            </div>
            <div class="cell" data-click-target="${index}">
                <select ${(gameStarted || !player.name.trim()) ? 'disabled' : ''} data-role-index="${index}">
                    ${getRoleOptions(player.role, index)}
                </select>
            </div>
            <div class="drag-cell">
                <div class="drag-handle" data-drag-index="${index}">☰</div>
            </div>
        `;

        table.appendChild(row);
    });

    updateChoiceButton();
    updateStartButton();
}

function renderScreen(){
    const phaseTitle = document.getElementById('phaseTitle');
    const startButtons = document.getElementById('startButtons');
    const gameButtons = document.getElementById('gameButtons');
    const wakeBlock = document.getElementById('wakeBlock');
    const choiceBtn = document.getElementById('choiceBtn');
    const wakeTitle = document.getElementById('wakeTitle');
    const actionText = document.getElementById('actionText');

    try{
        if(!gameStarted){
            phaseTitle.textContent = 'Знакомство';
            startButtons.style.display = 'flex';
            gameButtons.style.display = 'none';
            wakeBlock.style.display = 'none';

            if(typeof ensureVoteButton === 'function') ensureVoteButton(false);
            if(typeof ensureVotingNightButton === 'function') ensureVotingNightButton(false);
            if(typeof ensureNightSkipButton === 'function') ensureNightSkipButton(false);
        }
        else if(gameStage === 'day'){
            phaseTitle.textContent = 'Сейчас день';
            startButtons.style.display = 'none';
            gameButtons.style.display = 'flex';

            choiceBtn.textContent = 'Ночь';
            choiceBtn.disabled = false;
            choiceBtn.onclick = startNight;

            if(typeof ensureVoteButton === 'function') ensureVoteButton(true);
            if(typeof ensureVotingNightButton === 'function') ensureVotingNightButton(false);
            if(typeof ensureNightSkipButton === 'function') ensureNightSkipButton(false);

            const hasHistory =
                nightSkipped ||
                mafiaTargetIndex !== null ||
                maniacTargetIndex !== null ||
                commissionerTargetIndex !== null ||
                doctorTargetIndex !== null;

            wakeBlock.style.display = hasHistory ? 'block' : 'none';

            if(wakeTitle){
                wakeTitle.textContent = nightSkipped ? 'Ночь пропущена…' : '';
            }

            if(actionText){
                actionText.textContent = '';
            }

            safeRenderChoiceHistory();
        }
        else if(gameStage === 'voting'){
            phaseTitle.textContent = 'Сейчас день';
            startButtons.style.display = 'none';
            gameButtons.style.display = 'flex';

            if(typeof ensureVoteButton === 'function') ensureVoteButton(false);
            if(typeof ensureVotingNightButton === 'function') ensureVotingNightButton(true);
            if(typeof ensureNightSkipButton === 'function') ensureNightSkipButton(false);

            choiceBtn.textContent = 'Казнить';
            choiceBtn.disabled = votingTargetIndex === null;
            choiceBtn.onclick = confirmVotingChoice;

            wakeBlock.style.display = 'block';

            if(wakeTitle) wakeTitle.textContent = 'Голосование…';
            if(actionText) actionText.textContent = 'Выбери кого казнить (нажмите на игрока)';

            const historyEl = document.getElementById('choiceHistory');
            if(historyEl) historyEl.innerHTML = '';
        }
        else if(gameStage === 'night'){
            phaseTitle.textContent = 'Сейчас ночь';
            startButtons.style.display = 'none';
            gameButtons.style.display = 'flex';
            wakeBlock.style.display = 'block';

            if(typeof ensureVoteButton === 'function') ensureVoteButton(false);
            if(typeof ensureVotingNightButton === 'function') ensureVotingNightButton(false);
            if(typeof ensureNightSkipButton === 'function'){
                ensureNightSkipButton(
                    mafiaTargetIndex === null &&
                    maniacTargetIndex === null &&
                    commissionerTargetIndex === null &&
                    doctorTargetIndex === null
                );
            }

            choiceBtn.textContent = 'Выбор';
            choiceBtn.onclick = confirmNightChoice;

            renderWakeText();
        }
    }catch(error){
        console.error(error);
    }

    renderTable();
    saveState();
}

function renderWakeText(){
    const wakeTitle = document.getElementById('wakeTitle');
    const actionText = document.getElementById('actionText');

    if(activeWakeRole === ROLE_MAFIA){
        wakeTitle.textContent = 'Просыпается Мафия...';
        actionText.textContent = 'Мафия делает выбор (нажмите на игрока)';
    }else if(activeWakeRole === ROLE_MANIAC){
        wakeTitle.textContent = 'Просыпается Маньяк...';
        actionText.textContent = 'Маньяк делает выбор (нажмите на игрока)';
    }else if(activeWakeRole === ROLE_COMMISSIONER){
        wakeTitle.textContent = 'Просыпается Комиссар...';
        actionText.textContent = 'Комиссар делает выбор (нажмите на игрока)';
    }else if(activeWakeRole === ROLE_DOCTOR){
        wakeTitle.textContent = 'Просыпается Доктор...';
        actionText.textContent = 'Доктор делает выбор (нажмите на игрока)';
    }else{
        wakeTitle.textContent = '';
        actionText.textContent = '';
    }

    safeRenderChoiceHistory();
}

function safeRenderChoiceHistory(){
    try{
        renderChoiceHistory();
    }catch(error){
        const historyEl = document.getElementById('choiceHistory');
        if(historyEl){
            historyEl.innerHTML = '';
        }
    }
}

function renderChoiceHistory(){
    const history = [];
    const isDaySummary = gameStarted && gameStage === 'day';

    if(isDaySummary){
        const mafiaKilled = mafiaTargetIndex !== null;
        const maniacKilled = maniacTargetIndex !== null;

        const mafiaBlocked = mafiaKilled && mafiaTargetIndex === doctorTargetIndex;
        const maniacBlocked = maniacKilled && maniacTargetIndex === doctorTargetIndex;

        if(
            mafiaKilled && maniacKilled &&
            mafiaTargetIndex === maniacTargetIndex &&
            !mafiaBlocked && !maniacBlocked
        ){
            const name = getPlayerNameByIndex(mafiaTargetIndex);
            history.push(`— Мафия и Маньяк <span style='color:#d60000'>убили «${name}»</span>`);
        }
        else if(
            mafiaKilled && maniacKilled &&
            mafiaBlocked && maniacBlocked
        ){
            history.push(`— Мафия и Маньяк <span style='color:#888'>не убили</span>`);
        }
        else{
            if(mafiaKilled){
                const name = getPlayerNameByIndex(mafiaTargetIndex);

                history.push(
                    mafiaBlocked
                    ? `— Мафия <span style='color:#888'>не убила</span>`
                    : `— Мафия <span style='color:#d60000'>убила «${name}»</span>`
                );
            }

            if(maniacKilled){
                const name = getPlayerNameByIndex(maniacTargetIndex);

                history.push(
                    maniacBlocked
                    ? `— Маньяк <span style='color:#888'>не убил</span>`
                    : `— Маньяк <span style='color:#d60000'>убил «${name}»</span>`
                );
            }
        }

        if(commissionerTargetIndex !== null && players[commissionerTargetIndex]){
            const checkedRole = players[commissionerTargetIndex].role;
            const isActiveRole = checkedRole === ROLE_MAFIA || checkedRole === ROLE_MANIAC;

            history.push(
                isActiveRole
                ? `— Комиссар проверил <span style='color:#2ecc71'>активную роль</span>`
                : `— Комиссар проверил <span style='color:#888'>неактивную роль</span>`
            );
        }

        if(doctorTargetIndex !== null && players[doctorTargetIndex]){
            const doctorSavedSomeone =
                doctorTargetIndex === mafiaTargetIndex ||
                doctorTargetIndex === maniacTargetIndex;

            history.push(
                doctorSavedSomeone
                ? `— Доктор <span style='color:#2ecc71'>вылечил игрока</span>`
                : `— Доктор <span style='color:#888'>не вылечил</span>`
            );
        }
    }else{
        if(mafiaTargetIndex !== null && players[mafiaTargetIndex]){
            history.push(`— Мафия выбрала «${getPlayerNameByIndex(mafiaTargetIndex)}»`);
        }

        if(maniacTargetIndex !== null && players[maniacTargetIndex]){
            history.push(`— Маньяк выбрал «${getPlayerNameByIndex(maniacTargetIndex)}»`);
        }

        if(commissionerTargetIndex !== null && players[commissionerTargetIndex]){
            history.push(`— Комиссар выбрал «${getPlayerNameByIndex(commissionerTargetIndex)}»`);
        }

        if(doctorTargetIndex !== null && players[doctorTargetIndex]){
            history.push(`— Доктор выбрал «${getPlayerNameByIndex(doctorTargetIndex)}»`);
        }
    }

    document.getElementById('choiceHistory').innerHTML = history.join('<br>');
}

function updateChoiceButton(){
    const choiceBtn = document.getElementById('choiceBtn');
    if(!choiceBtn) return;

    if(gameStarted && gameStage === 'night'){
        choiceBtn.disabled = selectedTargetIndex === null;
    }

    if(gameStarted && gameStage === 'voting'){
        choiceBtn.disabled = votingTargetIndex === null;
    }
}

function hasRequiredStartRoles(){
    return hasRole(ROLE_MAFIA) && hasRole(ROLE_COMMISSIONER) && hasRole(ROLE_DOCTOR);
}

function updateStartButton(){
    const startBtn = document.getElementById('startBtn');
    if(!startBtn) return;

    if(gameStarted){
        startBtn.disabled = true;
        return;
    }

    startBtn.disabled = !hasRequiredStartRoles();
}

function updateName(index, value){
    if(players[index]){
        players[index].name = value;

        const roleSelect = document.querySelector(`[data-role-index="${index}"]`);

        if(roleSelect && !gameStarted){
            roleSelect.disabled = value.trim() === '';

            if(value.trim() === ''){
                players[index].role = ROLE_CIVILIAN;
                roleSelect.value = ROLE_CIVILIAN;
            }
        }

        updateStartButton();
        saveState();
    }
}

function updateRole(index, value){
    if(players[index]){
        players[index].role = normalizeRole(value);
        renderScreen();
    }
}

function addRow(){
    if(gameStarted) return;

    players.push({
        name:'',
        role:ROLE_CIVILIAN,
        alive:true
    });

    renderScreen();
}

function removeRow(){
    if(gameStarted || players.length <= 1) return;

    players.pop();
    renderScreen();
}

function startDay(){
    if(!hasRequiredStartRoles()){
        updateStartButton();
        return;
    }

    const filledPlayers = players.filter(player => player.name.trim() !== '');

    if(filledPlayers.length > 0){
        players = filledPlayers;
    }

    gameStarted = true;
    gameStage = 'day';
    activeWakeRole = null;
    selectedTargetIndex = null;
    votingTargetIndex = null;
    votingTargetIndex = null;
    mafiaTargetIndex = null;
    maniacTargetIndex = null;
    commissionerTargetIndex = null;
    doctorTargetIndex = null;
    previousDoctorTargetIndex = null;

    renderScreen();
}

function getNextAliveRole(afterRole){
    const order = [ROLE_MAFIA, ROLE_MANIAC, ROLE_COMMISSIONER, ROLE_DOCTOR];

    let startIndex = -1;

    if(afterRole !== null){
        startIndex = order.indexOf(afterRole);
    }

    for(let i = startIndex + 1; i < order.length; i++){
        const role = order[i];

        if(hasAliveRole(role)){
            return role;
        }
    }

    return null;
}


function ensureVoteButton(shouldShow){
    let voteBtn = document.getElementById('voteBtn');
    const choiceBtn = document.getElementById('choiceBtn');

    if(shouldShow){
        if(!voteBtn){
            voteBtn = document.createElement('button');
            voteBtn.className = 'main-btn choice-btn';
            voteBtn.id = 'voteBtn';
            voteBtn.textContent = 'Голос';
            voteBtn.addEventListener('click', startVoting);
            choiceBtn.insertAdjacentElement('afterend', voteBtn);
        }

        voteBtn.style.display = '';
    }else if(voteBtn){
        voteBtn.style.display = 'none';
    }
}

function ensureVotingNightButton(shouldShow){
    let votingNightBtn = document.getElementById('votingNightBtn');
    const choiceBtn = document.getElementById('choiceBtn');

    if(shouldShow){
        if(!votingNightBtn){
            votingNightBtn = document.createElement('button');
            votingNightBtn.className = 'main-btn choice-btn';
            votingNightBtn.id = 'votingNightBtn';
            votingNightBtn.textContent = 'Ночь';
            votingNightBtn.addEventListener('click', startNight);
            choiceBtn.insertAdjacentElement('afterend', votingNightBtn);
        }

        votingNightBtn.style.display = '';
        votingNightBtn.disabled = false;
    }else if(votingNightBtn){
        votingNightBtn.style.display = 'none';
    }
}


function startVoting(){
    gameStage = 'voting';
    votingTargetIndex = null;
    selectedTargetIndex = null;
    renderScreen();
}

function confirmVotingChoice(){
    if(votingTargetIndex === null){
        return;
    }

    if(players[votingTargetIndex]){
        players[votingTargetIndex].alive = false;
    }

    votingTargetIndex = null;
    startNight();
}



function ensureNightSkipButton(shouldShow){
    let daySkipBtn = document.getElementById('daySkipBtn');
    const choiceBtn = document.getElementById('choiceBtn');

    if(shouldShow){
        if(!daySkipBtn){
            daySkipBtn = document.createElement('button');
            daySkipBtn.className = 'main-btn choice-btn';
            daySkipBtn.id = 'daySkipBtn';
            daySkipBtn.textContent = 'День';
            daySkipBtn.addEventListener('click', skipNightToDay);
            choiceBtn.insertAdjacentElement('afterend', daySkipBtn);
        }

        daySkipBtn.style.display = '';
        daySkipBtn.disabled = false;
    }else if(daySkipBtn){
        daySkipBtn.style.display = 'none';
    }
}

function skipNightToDay(){
    nightSkipped = true;
    activeWakeRole = null;
    selectedTargetIndex = null;
    gameStage = 'day';
    renderScreen();
}


function startNight(){
    gameStage = 'night';
    nightSkipped = false;
    selectedTargetIndex = null;
    votingTargetIndex = null;
    activeWakeRole = null;

    mafiaTargetIndex = null;
    maniacTargetIndex = null;
    commissionerTargetIndex = null;
    doctorTargetIndex = null;

    const nextRole = getNextAliveRole(null);

    if(nextRole){
        startRoleWake(nextRole);
    }else{
        startMorning();
    }
}

function startRoleWake(role){
    activeWakeRole = role;
    selectedTargetIndex = null;
    renderScreen();
}

function confirmNightChoice(){
    if(selectedTargetIndex === null) return;

    if(activeWakeRole === ROLE_MAFIA){
        mafiaTargetIndex = selectedTargetIndex;
    }

    if(activeWakeRole === ROLE_MANIAC){
        maniacTargetIndex = selectedTargetIndex;
    }

    if(activeWakeRole === ROLE_COMMISSIONER){
        commissionerTargetIndex = selectedTargetIndex;
    }

    if(activeWakeRole === ROLE_DOCTOR){
        doctorTargetIndex = selectedTargetIndex;
        previousDoctorTargetIndex = selectedTargetIndex;
    }

    const currentRole = activeWakeRole;
    const nextRole = getNextAliveRole(currentRole);

    if(nextRole){
        startRoleWake(nextRole);
    }else{
        startMorning();
    }
}

function applyNightResults(){
    const killedIndexes = [];

    if(mafiaTargetIndex !== null && mafiaTargetIndex !== doctorTargetIndex){
        killedIndexes.push(mafiaTargetIndex);
    }

    if(maniacTargetIndex !== null && maniacTargetIndex !== doctorTargetIndex){
        killedIndexes.push(maniacTargetIndex);
    }

    [...new Set(killedIndexes)].forEach(index => {
        if(players[index]){
            players[index].alive = false;
        }
    });
}

function startMorning(){
    applyNightResults();
    nightSkipped = false;

    gameStage = 'day';
    activeWakeRole = null;
    selectedTargetIndex = null;
    renderScreen();
}

function choosePlayer(index){
    const player = players[index];
    if(!player) return;

    if(gameStage === 'voting'){
        if(player.alive === false){
            return;
        }

        votingTargetIndex = index;
        renderScreen();
        return;
    }

    if(gameStage !== 'night' || !activeWakeRole) return;

    if(player.role === activeWakeRole && activeWakeRole !== ROLE_DOCTOR){
        return;
    }

    if(player.alive === false){
        return;
    }

    if(activeWakeRole === ROLE_DOCTOR && previousDoctorTargetIndex === index){
        return;
    }

    selectedTargetIndex = index;
    renderScreen();
}

function hasRole(role){
    return players.some(player => player.role === role);
}

function hasAliveRole(role){
    return players.some(player => player.role === role && player.alive !== false);
}

function openFinishModal(){
    document.getElementById('finishModal').style.display = 'flex';
}

function closeFinishModal(){
    document.getElementById('finishModal').style.display = 'none';
}

function finishGame(){
    gameStarted = false;
    gameStage = 'intro';
    activeWakeRole = null;
    selectedTargetIndex = null;
    votingTargetIndex = null;
    mafiaTargetIndex = null;
    maniacTargetIndex = null;
    commissionerTargetIndex = null;
    doctorTargetIndex = null;
    previousDoctorTargetIndex = null;

    players = players.map(player => ({
        name:player.name,
        role:ROLE_CIVILIAN,
        alive:true
    }));

    closeFinishModal();
    renderScreen();
}


function updateDragPreviewNumbers(){
    if(!dragMoved){
        return;
    }

    const table = document.getElementById('playersTable');
    if(!table){
        return;
    }

    const slots = Array.from(table.children).filter(item =>
        item.classList.contains('data-row') || item.classList.contains('drag-placeholder')
    );

    slots.forEach((item, index) => {
        if(item.classList.contains('drag-placeholder')){
            return;
        }

        const numCell = item.querySelector('.number-cell');
        if(numCell && !item.classList.contains('dead-player')){
            numCell.textContent = index + 1;
        }
    });

    if(dragFloatingCard && currentOverIndex !== null){
        const floatingNumber = dragFloatingCard.querySelector('.number-cell');
        if(floatingNumber){
            let previewNumber = currentOverIndex + 1;

            if(currentOverIndex === draggedIndex){
                previewNumber = draggedIndex + 1;
            }else if(currentOverIndex > draggedIndex){
                previewNumber = currentOverIndex;
            }

            floatingNumber.textContent = previewNumber;
        }
    }
}

function restoreRealNumbers(){
    document.querySelectorAll('.data-row').forEach((row, index) => {
        const numCell = row.querySelector('.number-cell');
        const player = players[index];

        if(numCell && player){
            numCell.textContent = player.alive === false ? '☠️' : index + 1;
        }
    });
}


function startDrag(event, index){
    if(gameStarted) return;

    event.preventDefault();

    const handle = event.target.closest('[data-drag-index]');
    const row = document.querySelector(`.data-row[data-index="${index}"]`);

    if(!handle || !row){
        return;
    }

    draggedIndex = index;
    currentOverIndex = index;
    dragMoved = false;

    const rect = row.getBoundingClientRect();

    dragStartOffsetX = event.clientX - rect.left;
    dragStartOffsetY = event.clientY - rect.top;

    dragFloatingCard = row.cloneNode(true);
    dragFloatingCard.classList.add('drag-floating-card');
    dragFloatingCard.style.width = rect.width + 'px';
    dragFloatingCard.style.height = rect.height + 'px';
    dragFloatingCard.style.transform = `translate3d(${rect.left}px, ${rect.top}px, 0)`;
    document.body.appendChild(dragFloatingCard);

    dragPlaceholder = document.createElement('div');
    dragPlaceholder.className = 'drag-placeholder';
    dragPlaceholder.style.height = rect.height + 'px';
    dragPlaceholder.innerHTML = '';

    row.parentNode.insertBefore(dragPlaceholder, row);
    row.classList.add('dragging-source');

    handle.setPointerCapture(event.pointerId);
    handle.onpointermove = moveDrag;
    handle.onpointerup = endDrag;
    handle.onpointercancel = endDrag;
}

function moveDrag(event){
    if(draggedIndex === null || !dragFloatingCard || !dragPlaceholder){
        return;
    }

    const x = event.clientX - dragStartOffsetX;
    const y = event.clientY - dragStartOffsetY;
    dragFloatingCard.style.transform = `translate3d(${x}px, ${y}px, 0)`;

    if(!dragMoved){
        const dx = Math.abs(x);
        const dy = Math.abs(y);

        if(dx < 8 && dy < 8){
            return;
        }

        dragMoved = true;
    }

    const table = document.getElementById('playersTable');
    const rows = Array.from(table.querySelectorAll('.data-row:not(.dragging-source)'));

    let inserted = false;

    for(const row of rows){
        const rect = row.getBoundingClientRect();
        const middle = rect.top + rect.height / 2;

        if(event.clientY < middle){
            table.insertBefore(dragPlaceholder, row);
            inserted = true;
            break;
        }
    }

    if(!inserted){
        table.appendChild(dragPlaceholder);
    }

    const slots = Array.from(table.children).filter(item =>
        item.classList.contains('data-row') || item.classList.contains('drag-placeholder')
    );

    const newIndex = slots.indexOf(dragPlaceholder);

    if(newIndex !== currentOverIndex){
        currentOverIndex = newIndex;
        updateDragPreviewNumbers();
    }
}

function endDrag(event){
    const handle = event.target.closest('[data-drag-index]') || event.target;

    try{
        handle.releasePointerCapture(event.pointerId);
    }catch(error){}

    handle.onpointermove = null;
    handle.onpointerup = null;
    handle.onpointercancel = null;

    const sourceRow = document.querySelector('.data-row.dragging-source');

    if(sourceRow){
        sourceRow.classList.remove('dragging-source');
    }

    if(dragFloatingCard){
        dragFloatingCard.remove();
        dragFloatingCard = null;
    }

    if(draggedIndex !== null && currentOverIndex !== null){
        let targetIndex = currentOverIndex;

        if(targetIndex > draggedIndex){
            targetIndex -= 1;
        }

        targetIndex = Math.max(0, Math.min(players.length - 1, targetIndex));

        if(targetIndex !== draggedIndex){
            const movedPlayer = players.splice(draggedIndex, 1)[0];
            players.splice(targetIndex, 0, movedPlayer);
        }
    }

    if(dragPlaceholder){
        dragPlaceholder.remove();
        dragPlaceholder = null;
    }

    draggedIndex = null;
    currentOverIndex = null;
    dragMoved = false;
    restoreRealNumbers();

    renderScreen();
}

function clearBrokenOldState(){
    const oldKeys = [
        'mafia_app_state_v1',
        'mafia_app_state_v2'
    ];

    oldKeys.forEach(key => localStorage.removeItem(key));
}

function bindEvents(){
    const topFinishBtn = document.getElementById('topFinishBtn');
    if(topFinishBtn){
        topFinishBtn.addEventListener('click', openFinishModal);
    }

    document.getElementById('addBtn').addEventListener('click', addRow);
    document.getElementById('removeBtn').addEventListener('click', removeRow);
    document.getElementById('startBtn').addEventListener('click', startDay);
    document.getElementById('finishBtn').addEventListener('click', openFinishModal);
    document.getElementById('finishYesBtn').addEventListener('click', finishGame);
    document.getElementById('finishNoBtn').addEventListener('click', closeFinishModal);

    
document.getElementById('playersTable').addEventListener('input', event => {
        const index = event.target.dataset.nameIndex;

        if(index !== undefined){
            updateName(Number(index), event.target.value);
        }
    });

    document.getElementById('playersTable').addEventListener('change', event => {
        const index = event.target.dataset.roleIndex;

        if(index !== undefined){
            updateRole(Number(index), event.target.value);
        }
    });

    document.getElementById('playersTable').addEventListener('click', event => {
        const cell = event.target.closest('[data-click-target]');

        if(!cell){
            return;
        }

        choosePlayer(Number(cell.dataset.clickTarget));
    });

    document.getElementById('playersTable').addEventListener('pointerdown', event => {
        const handle = event.target.closest('[data-drag-index]');

        if(!handle){
            return;
        }

        startDrag(event, Number(handle.dataset.dragIndex));
    });
}

clearBrokenOldState();
bindEvents();
loadState();
renderScreen();

</script>
